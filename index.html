<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laporan Produksi v24</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; padding-bottom: 120px; }
        
        /* Navbar */
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; z-index: 100; }
        .logo { font-weight: 800; font-size: 0.9rem; color: #0f172a; text-transform: uppercase; }
        .btn-send-icon { width: 40px; height: 40px; background: #f0fdf4; color: #16a34a; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid #dcfce7; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.01); margin-bottom: 15px; }
        .section-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        .field { width: 100%; background: #f8fafc; border: 1.5px solid #f1f5f9; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 700; color: #334155; outline: none; }
        .field-readonly { background: #f1f5f9; color: #94a3b8; }

        /* Table Style & Zebra Striping */
        .table-container { width: 100%; border-radius: 18px; border: 1px solid #f1f5f9; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        th { background: #f8fafc; padding: 12px; font-weight: 800; color: #64748b; border-bottom: 1px solid #f1f5f9; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-weight: 600; color: #475569; transition: 0.3s; }
        tr:nth-child(even) td { background-color: #fcfdfe; }
        .highlight-edit td { background-color: #f0fdf4 !important; color: #16a34a !important; }

        /* Dropdown & Toast */
        .dropdown { position: relative; }
        .btn-dots { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; cursor: pointer; color: #64748b; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 38px; background: white; min-width: 140px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 14px; z-index: 400; border: 1px solid #f1f5f9; overflow: hidden; }
        .dropdown-content button { width: 100%; padding: 12px; border: none; background: none; text-align: left; font-size: 11px; font-weight: 700; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .show { display: block !important; }

        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(150%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 16px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px; transition: 0.4s; opacity: 0; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* FIX BOTTOM BAR: Paling Depan */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 25px; background: linear-gradient(to top, white 85%, transparent); z-index: 800; display: flex; justify-content: center; pointer-events: none; }
        .btn-add-ghost { background: #2563eb; color: white; border: none; font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 14px 24px; border-radius: 50px; pointer-events: auto; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); transition: 0.2s; }
        .btn-add-ghost:active { transform: scale(0.95); opacity: 0.9; }

        /* Overlay & Sheets */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 1000; }
        .modal-sheet { background: white; width: 100%; border-radius: 32px 32px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: 0.3s ease-out; }
        .modal-open .modal-sheet { transform: translateY(0); }
        .full-table-overlay { position: fixed; inset: 0; background: white; z-index: 900; display: none; flex-direction: column; padding: 20px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

    <div id="toast"><i data-lucide="check-circle" size="18"></i> <span id="toastMsg">Simpan Berhasil</span></div>

    <nav class="navbar">
        <h1 class="logo">Laporan Produksi</h1>
        <button class="btn-send-icon" onclick="showToast('Menyinkronkan data...')"><i data-lucide="cloud-upload" size="20"></i></button>
    </nav>

    <div class="container">
        <div class="card">
            <span class="section-title">Informasi Dasar</span>
            <div style="margin-bottom:10px"><input type="date" id="globalTanggal" class="field"></div>
            <div class="grid-2">
                <select id="globalShift" class="field" onchange="autoFillShiftTime()">
                    <option value="" disabled selected>Pilih Shift</option>
                    <option value="1">Shift 1 (Pagi)</option>
                    <option value="2">Shift 2 (Sore)</option>
                    <option value="3">Shift 3 (Malam)</option>
                </select>
                <div style="display:flex; align-items:center; justify-content:center; background:#f8fafc; border-radius:14px; border:1.5px solid #f1f5f9">
                    <span id="displayJamKerja" style="font-weight:800; color:#2563eb; font-size:11px">00:00 — 00:00</span>
                </div>
            </div>
        </div>

        <div class="card" style="padding:15px">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                <span class="section-title" style="margin-bottom:0">Daftar Item</span>
                <button class="btn-dots" style="width:35px; height:35px; display:flex; align-items:center; justify-content:center" onclick="toggleFullTable(true)"><i data-lucide="maximize" size="16"></i></button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Produk</th><th>Karung</th><th>Line</th><th style="text-align:right">Aksi</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="emptyState" style="text-align:center; padding:40px; opacity:0.3; font-size:10px; font-weight:800">DATA KOSONG</div>
        </div>
    </div>

    <div id="fullTableOverlay" class="full-table-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-weight:800; font-size:1rem">Detail Produksi</h2>
            <button onclick="toggleFullTable(false)" style="border:none; background:#f1f5f9; padding:10px; border-radius:12px"><i data-lucide="x" size="20"></i></button>
        </div>
        <div style="overflow-x: auto; flex-grow: 1; border: 1px solid #f1f5f9; border-radius: 16px;">
            <table style="min-width: 1000px;">
                <thead>
                    <tr><th>Jam Ops</th><th>Produk</th><th>Versi</th><th>Line</th><th>Kavling</th><th>Label</th><th>Karung</th><th>Tap</th><th>Swp</th><th>Robek</th><th style="text-align:right">Aksi</th></tr>
                </thead>
                <tbody id="fullTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-add-ghost" onclick="openModal()">
            <i data-lucide="plus-circle" size="20"></i> TAMBAH PRODUK
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 id="modalHeaderTitle" style="font-weight:800; font-size:1.1rem">Input Data</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:#cbd5e1"><i data-lucide="x-circle" size="28"></i></button>
            </div>
            <form id="prodForm">
                <input type="hidden" id="editId">
                <div class="grid-2" style="margin-bottom:15px">
                    <div><span class="section-title">Produk</span><input type="text" id="namaProduk" required class="field"></div>
                    <div>
                        <span class="section-title">Line</span>
                        <select id="lineBagging" required class="field">
                            <option value="Bagging Off 1">Bagging Off 1</option>
                            <option value="Bagging Off 2">Bagging Off 2</option>
                            <option value="Bagging Off 3">Bagging Off 3</option>
                            <option value="Bagging Off 4">Bagging Off 4</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2" style="margin-bottom:15px">
                    <div><span class="section-title">Mulai</span><input type="time" id="jamAwal" required class="field"></div>
                    <div><span class="section-title">Selesai</span><input type="time" id="jamAkhir" required class="field"></div>
                </div>
                <div class="grid-2" style="margin-bottom:15px">
                    <div><span class="section-title">Versi</span><input type="text" id="versi" required class="field"></div>
                    <div><span class="section-title">Kavling</span><input type="text" id="kavlingTujuan" required class="field"></div>
                </div>
                <div class="grid-2" style="margin-bottom:15px">
                    <div><span class="section-title">Label Mulai</span><input type="number" id="labelDari" required class="field" oninput="calcLabel()"></div>
                    <div><span class="section-title">Label Selesai</span><input type="number" id="labelSampai" readonly class="field field-readonly"></div>
                </div>
                <div class="grid-2" style="margin-bottom:15px">
                    <div><span class="section-title">Batch</span><input type="number" id="jmlBatch" required class="field"></div>
                    <div><span class="section-title" style="color:#2563eb">Karung</span><input type="number" id="jmlKarung" required class="field" oninput="calcLabel()" style="background:#eff6ff"></div>
                </div>
                <div class="grid-3" style="margin-bottom:25px">
                    <div><span class="section-title">Tap</span><input type="number" step="0.01" id="jmlTap" class="field" placeholder="0"></div>
                    <div><span class="section-title">Sweep</span><input type="number" step="0.01" id="jmlSweeping" class="field" placeholder="0"></div>
                    <div><span class="section-title" style="color:#ef4444">Robek</span><input type="number" id="jmlRobek" class="field" placeholder="0"></div>
                </div>
                <button type="submit" id="btnSimpan" style="width:100%; height:55px; background:#2563eb; color:white; border:none; border-radius:18px; font-weight:800; cursor:pointer">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let localData = JSON.parse(localStorage.getItem('prod_v24')) || [];
        let lastId = null;

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = m;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function calcLabel() {
            const s = parseInt(document.getElementById('labelDari').value);
            const q = parseInt(document.getElementById('jmlKarung').value);
            document.getElementById('labelSampai').value = (!isNaN(s) && !isNaN(q)) ? (s + q - 1) : "";
        }

        function autoFillShiftTime() {
            const s = document.getElementById('globalShift').value;
            const t = { "1": "08:00 — 16:00", "2": "16:00 — 00:00", "3": "00:00 — 08:00" };
            document.getElementById('displayJamKerja').innerText = t[s] || "00:00 — 00:00";
        }

        function toggleDropdown(id, sfx) {
            const eid = 'dd-' + id + sfx;
            document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== eid) d.classList.remove('show'); });
            const el = document.getElementById(eid);
            if(el) el.classList.toggle('show');
        }

        window.onclick = e => { if (!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); }

        function toggleFullTable(show) {
            document.getElementById('fullTableOverlay').style.display = show ? 'flex' : 'none';
            if(show) renderFull();
        }

        function openModal(id = null, view = false) {
            const modal = document.getElementById('modalOverlay');
            document.getElementById('btnSimpan').style.display = view ? 'none' : 'block';
            modal.style.display = 'flex';
            setTimeout(() => document.body.classList.add('modal-open'), 10);
            
            if(id) {
                const i = localData.find(x => x.id === id);
                document.getElementById('editId').value = i.id;
                document.getElementById('namaProduk').value = i.namaProduk;
                document.getElementById('lineBagging').value = i.lineBagging;
                document.getElementById('jamAwal').value = i.jamAwal;
                document.getElementById('jamAkhir').value = i.jamAkhir;
                document.getElementById('versi').value = i.versi;
                document.getElementById('kavlingTujuan').value = i.kavlingTujuan;
                document.getElementById('labelDari').value = i.labelDari;
                document.getElementById('labelSampai').value = i.labelSampai;
                document.getElementById('jmlBatch').value = i.jmlBatch;
                document.getElementById('jmlKarung').value = i.jmlKarung;
                document.getElementById('jmlTap').value = i.jmlTap;
                document.getElementById('jmlSweeping').value = i.jmlSweeping;
                document.getElementById('jmlRobek').value = i.jmlRobek;
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('labelSampai').value = "";
            }
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
        }

        document.getElementById('prodForm').onsubmit = e => {
            e.preventDefault();
            const eid = document.getElementById('editId').value;
            const obj = {
                id: eid ? parseInt(eid) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                lineBagging: document.getElementById('lineBagging').value,
                jamAwal: document.getElementById('jamAwal').value, jamAkhir: document.getElementById('jamAkhir').value,
                versi: document.getElementById('versi').value, kavlingTujuan: document.getElementById('kavlingTujuan').value,
                labelDari: document.getElementById('labelDari').value, labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value, jmlKarung: document.getElementById('jmlKarung').value,
                jmlTap: document.getElementById('jmlTap').value || 0, jmlSweeping: document.getElementById('jmlSweeping').value || 0,
                jmlRobek: document.getElementById('jmlRobek').value || 0
            };

            if(eid) {
                localData = localData.map(x => x.id === parseInt(eid) ? obj : x);
                lastId = obj.id;
                showToast("Data Diperbarui");
            } else {
                localData.push(obj);
                showToast("Data Tersimpan");
            }

            localStorage.setItem('prod_v24', JSON.stringify(localData));
            closeModal();
            render();
            if(document.getElementById('fullTableOverlay').style.display === 'flex') renderFull();
        };

        function render() {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = '';
            document.getElementById('emptyState').style.display = localData.length ? 'none' : 'block';
            localData.forEach(i => {
                const hilite = i.id === lastId ? 'highlight-edit' : '';
                tb.insertAdjacentHTML('beforeend', `<tr class="${hilite}" id="r-${i.id}">
                    <td><div style="font-weight:800">${i.namaProduk}</div><div style="font-size:8px; opacity:0.5">${i.jamAwal}-${i.jamAkhir}</div></td>
                    <td style="color:#2563eb; font-weight:800">${i.jmlKarung}</td>
                    <td>${i.lineBagging}</td>
                    <td style="text-align:right"><div class="dropdown">
                        <button class="btn-dots" onclick="toggleDropdown(${i.id}, 'm')"><i data-lucide="more-vertical" size="16"></i></button>
                        <div id="dd-${i.id}m" class="dropdown-content">
                            <button onclick="openModal(${i.id}, true)"><i data-lucide="eye" size="14"></i> View</button>
                            <button onclick="openModal(${i.id})"><i data-lucide="edit-2" size="14"></i> Edit</button>
                            <button style="color:#ef4444" onclick="remove(${i.id})"><i data-lucide="trash" size="14"></i> Hapus</button>
                        </div>
                    </div></td></tr>`);
                if(i.id === lastId) setTimeout(() => { document.getElementById(`r-${i.id}`)?.classList.remove('highlight-edit'); lastId=null; }, 2000);
            });
            lucide.createIcons();
        }

        function renderFull() {
            const fb = document.getElementById('fullTableBody');
            fb.innerHTML = '';
            localData.forEach(i => {
                fb.insertAdjacentHTML('beforeend', `<tr>
                    <td>${i.jamAwal}-${i.jamAkhir}</td><td>${i.namaProduk}</td><td>${i.versi}</td><td>${i.lineBagging}</td><td>${i.kavlingTujuan}</td>
                    <td>${i.labelDari}-${i.labelSampai}</td><td>${i.jmlKarung}</td><td>${i.jmlTap}</td><td>${i.jmlSweeping}</td><td>${i.jmlRobek}</td>
                    <td style="text-align:right"><div class="dropdown">
                        <button class="btn-dots" onclick="toggleDropdown(${i.id}, 'f')"><i data-lucide="more-vertical" size="16"></i></button>
                        <div id="dd-${i.id}f" class="dropdown-content">
                            <button onclick="openModal(${i.id}, true)"><i data-lucide="eye" size="14"></i> View</button>
                            <button onclick="openModal(${i.id})"><i data-lucide="edit-2" size="14"></i> Edit</button>
                            <button style="color:#ef4444" onclick="remove(${i.id})"><i data-lucide="trash" size="14"></i> Hapus</button>
                        </div>
                    </div></td></tr>`);
            });
            lucide.createIcons();
        }

        function remove(id) {
            if(confirm("Hapus data?")) {
                localData = localData.filter(x => x.id !== id);
                localStorage.setItem('prod_v24', JSON.stringify(localData));
                showToast("Data Terhapus");
                render();
                if(document.getElementById('fullTableOverlay').style.display === 'flex') renderFull();
            }
        }

        window.onload = render;
    </script>
</body>
</html>
