<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Produksi Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Mobile-First Table Hide/Show */
        .desktop-table { display: none; }
        @media (min-width: 1024px) {
            .desktop-table { display: table; }
            .mobile-cards { display: none; }
        }

        /* Input Styling */
        .input-proper {
            @apply w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm transition-all outline-none;
        }
        .input-proper:focus {
            @apply bg-white border-blue-500 ring-4 ring-blue-50;
        }
        .label-proper {
            @apply block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1;
        }
    </style>
</head>
<body class="antialiased text-slate-900 pb-28">

    <header class="bg-white border-b sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                    <div class="p-2 bg-blue-600 rounded-lg text-white">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    </div>
                    <span>Produksi <span class="text-blue-600">App</span></span>
                </h1>
                <button onclick="sendToBackend()" id="btnKirim" class="flex items-center gap-2 px-5 py-2.5 bg-green-600 text-white rounded-xl hover:bg-green-700 shadow-md transition-all font-bold text-sm active:scale-95">
                    <i data-lucide="cloud-upload" class="w-4 h-4"></i> Kirim
                </button>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="col-span-2 md:col-span-1">
                    <label class="label-proper">Tanggal</label>
                    <input type="date" id="globalTanggal" class="input-proper">
                </div>
                <div>
                    <label class="label-proper">Shift</label>
                    <select id="globalShift" class="input-proper">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="flex gap-2 col-span-1">
                    <div class="w-full">
                        <label class="label-proper">Jam Awal</label>
                        <input type="time" id="globalJamAwal" class="input-proper">
                    </div>
                    <div class="w-full">
                        <label class="label-proper">Akhir</label>
                        <input type="time" id="globalJamAkhir" class="input-proper">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div id="emptyState" class="hidden text-center py-16">
            <i data-lucide="inbox" class="w-12 h-12 mx-auto text-slate-300 mb-2"></i>
            <p class="text-slate-400 text-sm">Belum ada data di tabel.</p>
        </div>

        <div class="hidden lg:block bg-white rounded-2xl border border-slate-200 overflow-hidden">
            <table class="w-full desktop-table">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                        <th class="px-4 py-4 text-left">Produk</th>
                        <th class="px-4 py-4 text-left">Line/Kav</th>
                        <th class="px-4 py-4 text-center">Batch</th>
                        <th class="px-4 py-4 text-center">Karung</th>
                        <th class="px-4 py-4 text-center">Robek</th>
                        <th class="px-4 py-4 text-center">Tap(Kg)</th>
                        <th class="px-4 py-4 text-center">Sweep(Kg)</th>
                        <th class="px-4 py-4 text-left">Label</th>
                        <th class="px-4 py-4 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="desktopTableBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div id="mobileCardsBody" class="mobile-cards grid grid-cols-1 gap-4 lg:hidden">
            </div>
    </main>

    <button onclick="openModal()" class="fixed bottom-6 right-6 flex items-center gap-2 px-6 py-4 bg-slate-900 text-white rounded-full shadow-2xl hover:bg-black transition-all active:scale-90 font-bold z-40">
        <i data-lucide="plus" class="w-6 h-6"></i>
        <span>Tambah</span>
    </button>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end lg:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full lg:max-w-2xl rounded-t-3xl lg:rounded-2xl shadow-2xl z-50 p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-bold">Tambah Produk</h2>
                <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <form id="prodForm" class="space-y-4 pb-10 lg:pb-0">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2 lg:col-span-1">
                        <label class="label-proper">Nama Produk</label>
                        <input type="text" id="namaProduk" required class="input-proper">
                    </div>
                    <div class="col-span-2 lg:col-span-1">
                        <label class="label-proper">Versi</label>
                        <input type="text" id="versi" required class="input-proper">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-proper">Line Bagging</label>
                        <input type="text" id="lineBagging" required class="input-proper">
                    </div>
                    <div>
                        <label class="label-proper">Kavling Tujuan</label>
                        <input type="text" id="kavlingTujuan" required class="input-proper">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 p-3 bg-blue-50 rounded-xl border border-blue-100">
                    <div class="col-span-2 text-[10px] font-bold text-blue-600 uppercase mb-1">Rentang Nomor Label</div>
                    <div>
                        <label class="label-proper">Dari</label>
                        <input type="text" id="labelDari" required class="input-proper border-blue-200">
                    </div>
                    <div>
                        <label class="label-proper">Sampai</label>
                        <input type="text" id="labelSampai" required class="input-proper border-blue-200">
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                    <div>
                        <label class="label-proper">Jml Batch</label>
                        <input type="number" id="jmlBatch" required class="input-proper">
                    </div>
                    <div>
                        <label class="label-proper">Jml Karung</label>
                        <input type="number" id="jmlKarung" required class="input-proper">
                    </div>
                    <div>
                        <label class="label-proper">Tap (Kg)</label>
                        <input type="number" step="0.01" id="jmlTap" required class="input-proper">
                    </div>
                    <div>
                        <label class="label-proper">Sweep (Kg)</label>
                        <input type="number" step="0.01" id="jmlSweeping" required class="input-proper">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-proper">Karung Robek</label>
                        <input type="number" id="jmlRobek" required class="input-proper">
                    </div>
                    <div class="flex gap-2">
                        <div class="w-full">
                            <label class="label-proper">Jam Mulai</label>
                            <input type="time" id="jamAwal" required class="input-proper">
                        </div>
                        <div class="w-full">
                            <label class="label-proper">Selesai</label>
                            <input type="time" id="jamAkhir" required class="input-proper">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i data-lucide="check" class="w-5 h-5"></i> Simpan ke Daftar
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v5')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Produk";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Tambah Produk";
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) { localData = localData.map(i => i.id === parseInt(editId) ? itemData : i); }
            else { localData.push(itemData); }

            localStorage.setItem('prod_v5', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const dBody = document.getElementById('desktopTableBody');
            const mBody = document.getElementById('mobileCardsBody');
            const emptyState = document.getElementById('emptyState');
            dBody.innerHTML = '';
            mBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach(item => {
                // Render Desktop Table Row
                const row = `
                    <tr class="text-sm">
                        <td class="px-4 py-4 font-bold text-slate-800">${item.namaProduk}<br><span class="text-[10px] text-slate-400 uppercase">${item.versi}</span></td>
                        <td class="px-4 py-4 text-xs">${item.lineBagging}<br><span class="text-blue-600 font-bold uppercase">${item.kavlingTujuan}</span></td>
                        <td class="px-4 py-4 text-center font-semibold">${item.jmlBatch}</td>
                        <td class="px-4 py-4 text-center font-bold text-blue-700">${item.jmlKarung}</td>
                        <td class="px-4 py-4 text-center text-red-500">${item.jmlRobek}</td>
                        <td class="px-4 py-4 text-center">${item.jmlTap}</td>
                        <td class="px-4 py-4 text-center">${item.jmlSweeping}</td>
                        <td class="px-4 py-4 text-[10px] font-mono text-slate-400">${item.labelDari} → ${item.labelSampai}</td>
                        <td class="px-4 py-4 text-right">
                            <div class="flex gap-2 justify-end">
                                <button onclick="openModal(${item.id})" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
                dBody.insertAdjacentHTML('beforeend', row);

                // Render Mobile Card
                const card = `
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-slate-800">${item.namaProduk}</h3>
                                <span class="text-[10px] px-2 py-0.5 bg-slate-100 rounded-full font-bold text-slate-500">${item.versi}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-2 bg-slate-50 rounded-lg text-slate-400"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2 bg-slate-50 rounded-lg text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 border-t border-slate-50 pt-3">
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Karung</p><p class="text-sm font-bold text-blue-700">${item.jmlKarung}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Robek</p><p class="text-sm font-bold text-red-500">${item.jmlRobek}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Batch</p><p class="text-sm font-bold">${item.jmlBatch}</p></div>
                        </div>
                        <div class="flex justify-between mt-3 text-[10px] bg-slate-50 p-2 rounded-lg font-medium text-slate-500 uppercase tracking-tighter">
                            <span>Line: ${item.lineBagging}</span>
                            <span>Kav: ${item.kavlingTujuan}</span>
                            <span>${item.jamAwal}-${item.jamAkhir}</span>
                        </div>
                    </div>
                `;
                mBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v5', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tanggal = document.getElementById('globalTanggal').value;
            const shift = document.getElementById('globalShift').value;
            const jamKerja = `${document.getElementById('globalJamAwal').value}-${document.getElementById('globalJamAkhir').value}`;
            if(!tanggal || !shift) return alert("Lengkapi Tanggal/Shift!");
            if(localData.length === 0) return alert("Belum ada data.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const finalData = { ...item, tanggal, shift, jamKerja };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(finalData) });
                }
                alert("Berhasil!");
                localData = [];
                localStorage.removeItem('prod_v5');
                render();
            } catch (e) { alert("Gagal!"); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="cloud-upload" class="w-4 h-4"></i> Kirim`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
