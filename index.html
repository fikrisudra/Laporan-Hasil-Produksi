<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProFlow - Responsive Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fcfdfe;
            color: #1e293b;
            overscroll-behavior-y: contain;
        }

        /* --- INPUT STYLING --- */
        .field-container {
            @apply bg-white border-2 border-slate-100 rounded-2xl p-3 px-4 transition-all duration-200 focus-within:border-blue-600 focus-within:ring-4 focus-within:ring-blue-500/5;
        }

        .label-style {
            @apply block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1;
        }

        .input-style {
            @apply w-full bg-transparent border-none outline-none text-base font-bold text-slate-700 placeholder:text-slate-300;
        }

        /* --- RESPONSIVE MODAL/SHEET --- */
        #modal {
            @apply fixed inset-0 z-[100] flex items-end justify-center transition-all duration-300;
        }

        #sheet {
            @apply bg-white w-full max-w-2xl rounded-t-[40px] shadow-2xl transform translate-y-full transition-transform duration-500 ease-out overflow-hidden flex flex-col;
            max-height: 92vh;
        }

        /* --- TACTILE BUTTONS --- */
        .btn-main-action {
            @apply h-16 rounded-2xl font-black text-sm tracking-widest transition-all duration-200 active:scale-95 flex items-center justify-center gap-3 shadow-lg;
        }

        .fab-container {
            @apply fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-white via-white/80 to-transparent z-50;
        }

        /* Prevent scrolling on body when modal open */
        body.modal-open { overflow: hidden; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased pb-32">

    <nav class="sticky top-0 z-40 bg-white/70 backdrop-blur-2xl border-b border-slate-50 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-indigo-200 shadow-lg">
                    <i data-lucide="activity" class="text-blue-400 w-5 h-5"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter">ProFlow<span class="text-blue-600">.</span></h1>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] tracking-widest flex items-center gap-2 active:scale-90 transition-all shadow-md shadow-emerald-100 uppercase">
                <i data-lucide="send" class="w-3.5 h-3.5"></i> Kirim
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 mt-8">
        <div class="bg-slate-50/50 rounded-[32px] p-6 border border-slate-100 mb-8">
            <h2 class="label-style mb-4 flex items-center gap-2"><i data-lucide="calendar" class="w-3 h-3"></i> Info Sesi</h2>
            <div class="space-y-4">
                <div class="field-container">
                    <label class="label-style">Tanggal</label>
                    <input type="date" id="globalTanggal" class="input-style">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="field-container">
                        <label class="label-style">Shift</label>
                        <select id="globalShift" class="input-style">
                            <option value="1">Shift 01</option>
                            <option value="2">Shift 02</option>
                            <option value="3">Shift 03</option>
                        </select>
                    </div>
                    <div class="field-container">
                        <label class="label-style">Rentang Waktu</label>
                        <div class="flex items-center gap-1">
                            <input type="time" id="globalJamAwal" class="input-style !text-[13px]">
                            <input type="time" id="globalJamAkhir" class="input-style !text-[13px]">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-4"></div>

        <div id="emptyState" class="hidden text-center py-20 opacity-40">
            <i data-lucide="container" class="w-12 h-12 mx-auto mb-3"></i>
            <p class="font-bold text-[10px] uppercase tracking-widest">Belum ada data rincian</p>
        </div>
    </main>

    <div class="fab-container">
        <div class="max-w-xl mx-auto">
            <button onclick="openModal()" class="w-full btn-main-action bg-slate-900 text-white shadow-slate-200">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </div>
                INPUT PRODUK BARU
            </button>
        </div>
    </div>

    <div id="modal" class="hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300" id="overlay" onclick="closeModal()"></div>
        
        <div id="sheet">
            <div class="w-14 h-1.5 bg-slate-100 rounded-full mx-auto mt-5 mb-2 flex-shrink-0"></div>
            
            <div class="p-8 pt-4 overflow-y-auto flex-grow pb-12">
                <div class="flex justify-between items-center mb-8 sticky top-0 bg-white py-2 z-10">
                    <h2 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Rincian Baru</h2>
                    <button onclick="closeModal()" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 active:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>

                <form id="prodForm" class="space-y-5">
                    <input type="hidden" id="editId">
                    
                    <div class="field-container">
                        <label class="label-style">Informasi Produk</label>
                        <input type="text" id="namaProduk" required placeholder="Nama Produk" class="input-style">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="field-container">
                            <label class="label-style">Versi</label>
                            <input type="text" id="versi" required placeholder="v1.0" class="input-style">
                        </div>
                        <div class="field-container">
                            <label class="label-style">Kavling</label>
                            <input type="text" id="kavlingTujuan" required placeholder="Kavling A" class="input-style">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="field-container">
                            <label class="label-style">Line Bagging</label>
                            <input type="text" id="lineBagging" required placeholder="Line 01" class="input-style">
                        </div>
                        <div class="field-container">
                            <label class="label-style">Jam Bagging</label>
                            <div class="flex gap-1">
                                <input type="time" id="jamAwal" required class="input-style !text-[13px]">
                                <input type="time" id="jamAkhir" required class="input-style !text-[13px]">
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-900 p-6 rounded-[32px] space-y-4 shadow-xl">
                        <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Nomor Seri Label</label>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="labelDari" placeholder="Dari" required class="bg-white/10 border border-white/5 h-12 rounded-xl px-4 text-white font-bold outline-none focus:border-blue-500 text-sm">
                            <input type="text" id="labelSampai" placeholder="Sampai" required class="bg-white/10 border border-white/5 h-12 rounded-xl px-4 text-white font-bold outline-none focus:border-blue-500 text-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="field-container border-blue-50 bg-blue-50/20">
                            <label class="label-style text-blue-600">Total Karung</label>
                            <input type="number" id="jmlKarung" required placeholder="0" class="input-style text-blue-600">
                        </div>
                        <div class="field-container">
                            <label class="label-style">Batch</label>
                            <input type="number" id="jmlBatch" required placeholder="0" class="input-style">
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="field-container border-red-50 !p-2 px-3">
                            <label class="label-style text-red-500 !text-[8px]">Robek</label>
                            <input type="number" id="jmlRobek" required class="input-style text-red-500">
                        </div>
                        <div class="field-container !p-2 px-3">
                            <label class="label-style !text-[8px]">Tap (Kg)</label>
                            <input type="number" step="0.01" id="jmlTap" required class="input-style">
                        </div>
                        <div class="field-container !p-2 px-3">
                            <label class="label-style !text-[8px]">Sweep (Kg)</label>
                            <input type="number" step="0.01" id="jmlSweeping" required class="input-style">
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-main-action bg-blue-600 text-white shadow-blue-100 mt-4">
                        <i data-lucide="check" class="w-5 h-5"></i> SIMPAN DATA
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v9_responsive')) || [];

        function openModal(editId = null) {
            const modal = document.getElementById('modal');
            const sheet = document.getElementById('sheet');
            document.body.classList.add('modal-open');
            modal.classList.remove('hidden');
            setTimeout(() => sheet.classList.remove('translate-y-full'), 10);

            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Rincian";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Rincian Baru";
            }
        }

        function closeModal() {
            const sheet = document.getElementById('sheet');
            sheet.classList.add('translate-y-full');
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 300);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v9_responsive', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach((item) => {
                const card = `
                    <div class="bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-11 h-11 bg-slate-900 rounded-2xl flex items-center justify-center text-white">
                                    <i data-lucide="package" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="font-black text-slate-800 text-base leading-none">${item.namaProduk}</h4>
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1 inline-block">${item.lineBagging} • ${item.versi}</span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-2.5 bg-slate-50 rounded-xl text-slate-400 active:text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2.5 bg-slate-50 rounded-xl text-slate-400 active:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2.5 mb-5">
                            <div class="bg-blue-50/50 rounded-2xl p-3 text-center">
                                <span class="block text-[8px] font-black text-blue-400 uppercase mb-1">Karung</span>
                                <span class="text-base font-black text-blue-600">${item.jmlKarung}</span>
                            </div>
                            <div class="bg-red-50/50 rounded-2xl p-3 text-center">
                                <span class="block text-[8px] font-black text-red-400 uppercase mb-1">Robek</span>
                                <span class="text-base font-black text-red-500">${item.jmlRobek}</span>
                            </div>
                            <div class="bg-slate-50 rounded-2xl p-3 text-center">
                                <span class="block text-[8px] font-black text-slate-400 uppercase mb-1">Batch</span>
                                <span class="text-base font-black text-slate-800">${item.jmlBatch}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 border-t border-slate-50 pt-4 px-1">
                            <div class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-500"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5 text-blue-500"></i> ${item.jamAwal}</div>
                            <div class="font-mono bg-slate-50 px-2 py-0.5 rounded text-slate-500 italic">${item.labelDari}..</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v9_responsive', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Belum ada data.");
            
            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Sinkronisasi Selesai!");
                localData = [];
                localStorage.removeItem('prod_v9_responsive');
                render();
            } catch (e) { alert("Error: Periksa Koneksi."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-3.5 h-3.5"></i> Kirim`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
