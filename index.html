<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProFlow - Production System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        /* Input Box yang Proper & Berkarakter */
        .input-group {
            @apply relative flex flex-col gap-1.5 w-full;
        }

        .input-control {
            @apply h-13 w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none transition-all duration-200 text-slate-700 font-medium shadow-sm;
        }

        .input-control:focus {
            @apply border-blue-500 ring-4 ring-blue-50 bg-white shadow-md;
        }

        .label-text {
            @apply text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1;
        }

        /* Mencegah zoom otomatis pada perangkat seluler */
        input, select, textarea { font-size: 16px !important; }

        /* Animasi Modal */
        .modal-enter {
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased pb-28">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-5 py-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tight text-slate-900">
                PRO<span class="text-blue-600">FLOW</span>
            </h1>
            <button onclick="sendToBackend()" id="btnKirim" class="bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-green-100 active:scale-95 transition-all flex items-center gap-2">
                <i data-lucide="send" class="w-4 h-4"></i> Kirim
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-5 pt-6">
        <div class="bg-white rounded-[32px] p-6 border border-slate-200 shadow-sm mb-6 space-y-5">
            <div class="input-group">
                <label class="label-text">Tanggal Produksi</label>
                <input type="date" id="globalTanggal" class="input-control">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="label-text">Shift</label>
                    <select id="globalShift" class="input-control">
                        <option value="1">Shift 1</option>
                        <option value="2">Shift 2</option>
                        <option value="3">Shift 3</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="label-text">Target Jam</label>
                    <div class="flex items-center gap-2 h-full">
                        <input type="time" id="globalJamAwal" class="input-control !px-2 text-center text-sm">
                        <span class="text-slate-300">-</span>
                        <input type="time" id="globalJamAkhir" class="input-control !px-2 text-center text-sm">
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-4"></div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="package-search" class="text-slate-300 w-8 h-8"></i>
            </div>
            <p class="text-slate-400 font-medium">Belum ada rincian produksi.</p>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 px-6 flex justify-center z-40">
        <button onclick="openModal()" class="w-full max-w-md bg-slate-900 text-white py-4.5 rounded-2xl font-bold shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <i data-lucide="plus-circle" class="w-6 h-6 text-blue-400"></i>
            <span>Tambah Rincian Produk</span>
        </button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div class="modal-enter bg-white w-full sm:max-w-lg rounded-t-[40px] sm:rounded-[32px] shadow-2xl z-50 overflow-hidden flex flex-col max-h-[92vh]">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-4 mb-2 sm:hidden"></div>
            
            <div class="p-8 pt-2 overflow-y-auto">
                <div class="flex justify-between items-center mb-6 sticky top-0 bg-white py-4 z-10 border-b border-slate-50">
                    <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Input Rincian</h2>
                    <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-xl text-slate-500 hover:text-red-500 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <form id="prodForm" class="space-y-6 pb-10">
                    <input type="hidden" id="editId">
                    
                    <div class="input-group">
                        <label class="label-text">Nama Produk</label>
                        <input type="text" id="namaProduk" required placeholder="Contoh: Urea G1" class="input-control">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label class="label-text">Versi</label>
                            <input type="text" id="versi" required class="input-control">
                        </div>
                        <div class="input-group">
                            <label class="label-text">Kavling</label>
                            <input type="text" id="kavlingTujuan" required class="input-control">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label class="label-text">Line Bagging</label>
                            <input type="text" id="lineBagging" required class="input-control">
                        </div>
                        <div class="input-group">
                            <label class="label-text">Jam Operasional</label>
                            <div class="flex items-center gap-2">
                                <input type="time" id="jamAwal" required class="input-control !px-2 text-center text-xs">
                                <input type="time" id="jamAkhir" required class="input-control !px-2 text-center text-xs">
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-50/50 p-5 rounded-[28px] border border-blue-100 space-y-4">
                        <label class="block text-center text-[10px] font-extrabold text-blue-600 uppercase tracking-widest border-b border-blue-100 pb-2">Nomor Seri Label</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="labelDari" placeholder="Dari" required class="input-control border-blue-200">
                            <input type="text" id="labelSampai" placeholder="Sampai" required class="input-control border-blue-200">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label class="label-text">Jml Batch</label>
                            <input type="number" id="jmlBatch" required class="input-control">
                        </div>
                        <div class="input-group">
                            <label class="label-text text-blue-600">Jml Karung</label>
                            <input type="number" id="jmlKarung" required class="input-control border-blue-200 font-bold text-blue-600">
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="input-group">
                            <label class="label-text text-red-500">Robek</label>
                            <input type="number" id="jmlRobek" required class="input-control border-red-100">
                        </div>
                        <div class="input-group">
                            <label class="label-text">Tap (Kg)</label>
                            <input type="number" step="0.01" id="jmlTap" required class="input-control">
                        </div>
                        <div class="input-group">
                            <label class="label-text">Sweep (Kg)</label>
                            <input type="number" step="0.01" id="jmlSweeping" required class="input-control">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-4.5 rounded-2xl font-bold shadow-xl shadow-blue-200 flex items-center justify-center gap-2 active:scale-95 transition-all text-sm tracking-wide">
                        <i data-lucide="save" class="w-5 h-5"></i> SIMPAN RINCIAN
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v_responsive_proper')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Rincian";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Input Rincian";
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v_responsive_proper', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach(item => {
                const card = `
                    <div class="bg-white rounded-[28px] p-5 border border-slate-200 shadow-sm relative overflow-hidden transition-all active:scale-[0.99]">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-slate-800 text-base">${item.namaProduk}</h4>
                                <div class="flex gap-2 mt-1">
                                    <span class="text-[9px] font-bold px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md uppercase tracking-wider">${item.versi}</span>
                                    <span class="text-[9px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-md uppercase tracking-wider">${item.lineBagging}</span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-2.5 text-slate-400 hover:text-blue-600 active:bg-blue-50 rounded-xl transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2.5 text-slate-400 hover:text-red-500 active:bg-red-50 rounded-xl transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 bg-slate-50/50 rounded-2xl p-4 border border-slate-100">
                            <div class="text-center">
                                <p class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Karung</p>
                                <p class="text-base font-bold text-blue-600">${item.jmlKarung}</p>
                            </div>
                            <div class="text-center border-x border-slate-200">
                                <p class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Robek</p>
                                <p class="text-base font-bold text-red-500">${item.jmlRobek}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Batch</p>
                                <p class="text-base font-bold text-slate-700">${item.jmlBatch}</p>
                            </div>
                        </div>

                        <div class="mt-4 flex justify-between items-center text-[10px] font-bold text-slate-400">
                            <div class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3 text-blue-400"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${item.jamAwal}-${item.jamAkhir}</div>
                            <div class="bg-slate-900 text-white px-2 py-1 rounded-md text-[8px]">${item.labelDari} - ${item.labelSampai}</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus rincian ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v_responsive_proper', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Data kosong.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Data Berhasil Sinkron!");
                localData = [];
                localStorage.removeItem('prod_v_responsive_proper');
                render();
            } catch (e) { alert("Gagal Kirim."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> Kirim`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
