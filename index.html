<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Hasil Produksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass-modal { backdrop-filter: blur(12px); background: rgba(255,255,255,0.98); }
        .fab { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 40; }
        input, select { font-size: 14px !important; }
        .label-custom { display: block; text-transform: uppercase; font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 4px; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased text-gray-900">

    <header class="bg-white border-b sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight text-gray-800">
                Laporan <span class="text-blue-600">Produksi</span>
            </h1>
            <button onclick="sendToBackend()" id="btnKirim" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 shadow-sm transition-all active:scale-95 text-sm font-semibold">
                <i data-lucide="send" class="w-4 h-4"></i>
                <span>Kirim</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 pb-24">
        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="clipboard-list" class="w-12 h-12 mx-auto text-gray-300 mb-3"></i>
            <p class="text-gray-500 font-medium text-sm">Belum ada data di daftar tunggu.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase tracking-wider">Produk / Versi</th>
                            <th class="px-4 py-3 text-center text-[10px] font-bold text-gray-500 uppercase tracking-wider">Shift</th>
                            <th class="px-4 py-3 text-center text-[10px] font-bold text-gray-500 uppercase tracking-wider">Qty (Krng)</th>
                            <th class="px-4 py-3 text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="localTableBody" class="divide-y divide-gray-100 bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <button onclick="toggleModal()" class="fab flex items-center gap-2 px-6 py-4 bg-blue-600 text-white rounded-full shadow-2xl hover:bg-blue-700 transition-all active:scale-90 font-bold">
        <i data-lucide="plus" class="w-6 h-6"></i>
        <span>Tambah</span>
    </button>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onclick="toggleModal()"></div>
        
        <div class="glass-modal w-full sm:max-w-2xl h-[90vh] sm:h-auto overflow-y-auto rounded-t-3xl sm:rounded-2xl z-50 p-6">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white/50 py-2 z-10 backdrop-blur-md">
                <h2 class="text-xl font-bold text-gray-800">Tambah Produk</h2>
                <button onclick="toggleModal()" class="p-2 bg-gray-100 rounded-full text-gray-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <form id="prodForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-10">
                <div>
                    <label class="label-custom">Tanggal</label>
                    <input type="date" id="tanggal" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="label-custom">Shift</label>
                    <select id="shift" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none cursor-pointer">
                        <option value="1">Shift 1</option>
                        <option value="2">Shift 2</option>
                        <option value="3">Shift 3</option>
                    </select>
                </div>

                <div class="md:col-span-2 grid grid-cols-2 gap-4">
                    <div>
                        <label class="label-custom">Jam Kerja Awal</label>
                        <input type="time" id="jamKerjaAwal" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="label-custom">Jam Kerja Akhir</label>
                        <input type="time" id="jamKerjaAkhir" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                </div>

                <div>
                    <label class="label-custom">Nama Produk</label>
                    <input type="text" id="namaProduk" required placeholder="Nama Produk" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                </div>
                <div>
                    <label class="label-custom">Versi</label>
                    <input type="text" id="versi" required placeholder="v1.0" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                </div>

                <div>
                    <label class="label-custom">Line Bagging</label>
                    <input type="text" id="lineBagging" required placeholder="Line A" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                </div>
                <div>
                    <label class="label-custom">Kavling Tujuan</label>
                    <input type="text" id="kavlingTujuan" required placeholder="Kavling 01" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="label-custom">Jam Awal</label>
                        <input type="time" id="jamAwal" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="label-custom">Jam Akhir</label>
                        <input type="time" id="jamAkhir" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="label-custom">Nomor Label</label>
                    <input type="text" id="noLabel" required placeholder="LB-001" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4 md:col-span-2">
                    <div>
                        <label class="label-custom">Jumlah Batch</label>
                        <input type="number" id="jmlBatch" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="label-custom">Jumlah Karung</label>
                        <input type="number" id="jmlKarung" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 md:col-span-2">
                    <div>
                        <label class="label-custom">Karung Robek</label>
                        <input type="number" id="jmlRobek" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="label-custom">Jumlah Tap</label>
                        <input type="number" id="jmlTap" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="label-custom">Jumlah Sweeping</label>
                    <input type="number" id="jmlSweeping" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                </div>

                <div class="md:col-span-2 pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="save" class="w-5 h-5"></i> Simpan Lokal
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const scriptURL = 'URL_APPS_SCRIPT_ANDA'; 
        let localData = JSON.parse(localStorage.getItem('prod_complex_v1')) || [];

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                tanggal: document.getElementById('tanggal').value,
                shift: document.getElementById('shift').value,
                jamKerja: `${document.getElementById('jamKerjaAwal').value}-${document.getElementById('jamKerjaAkhir').value}`,
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                jamOperasional: `${document.getElementById('jamAwal').value}-${document.getElementById('jamAkhir').value}`,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value,
                noLabel: document.getElementById('noLabel').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value
            };
            
            localData.push(newItem);
            localStorage.setItem('prod_complex_v1', JSON.stringify(localData));
            this.reset();
            toggleModal();
            render();
        });

        function render() {
            const tbody = document.getElementById('localTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach(item => {
                const row = `
                    <tr class="text-sm">
                        <td class="px-4 py-4">
                            <div class="font-bold text-gray-800">${item.namaProduk}</div>
                            <div class="text-[10px] text-gray-400">${item.versi} | ${item.tanggal}</div>
                        </td>
                        <td class="px-4 py-4 text-center text-gray-600">S${item.shift}</td>
                        <td class="px-4 py-4 text-center font-semibold text-blue-600">${item.jmlKarung}</td>
                        <td class="px-4 py-4 text-right">
                            <button onclick="removeItem(${item.id})" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            localData = localData.filter(i => i.id !== id);
            localStorage.setItem('prod_complex_v1', JSON.stringify(localData));
            render();
        }

        async function sendToBackend() {
            if (localData.length === 0) return alert("Data kosong.");
            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(item) });
                }
                localData = [];
                localStorage.removeItem('prod_complex_v1');
                render();
                alert("Data Terkirim!");
            } catch (e) {
                alert("Gagal kirim.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> <span>Kirim</span>`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
