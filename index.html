<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laporan Hasil Produksi v34.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* CSS RESET & CORE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        
        html, body { overscroll-behavior-y: none; height: 100%; overflow-x: hidden; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
            padding-bottom: 100px; 
            line-height: 1.5;
        }
        
        /* Glassmorphism Navbar */
        .navbar { 
            position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.3); z-index: 100; 
        }
        .logo { font-weight: 800; font-size: 0.9rem; color: #0f172a; text-transform: uppercase; letter-spacing: 0.8px; }
        
        .btn-sync { 
            background: #10b981; color: white; border: none; 
            width: 42px; height: 42px; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25); 
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        .card { 
            background: white; border-radius: 28px; padding: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .section-title { 
            font-size: 11px; font-weight: 800; color: #64748b; 
            text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px; display: block; 
        }
        
        /* FORM FIELDS */
        .field { 
            width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; 
            border-radius: 16px; padding: 14px 16px; font-size: 14px; 
            font-weight: 600; color: #334155; outline: none; transition: all 0.2s ease; 
        }
        .field:focus { border-color: #3b82f6; background: white; }
        .field-readonly { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; border-style: dashed; }

        .input-group { position: relative; margin-bottom: 16px; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; z-index: 2; }
        .field-with-icon { padding-left: 48px !important; }

        /* TABLE STYLES */
        .table-container { width: 100%; border-radius: 20px; border: 1px solid #f1f5f9; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f8fafc; padding: 14px 12px; font-weight: 800; color: #475569; text-align: left; }
        td { padding: 18px 12px; border-bottom: 1px solid #f1f5f9; font-weight: 600; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 3000; }
        .modal-sheet { background: white; width: 100%; border-radius: 35px 35px 0 0; padding: 15px 25px 40px 25px; max-height: 94vh; overflow-y: auto; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-open .modal-sheet { transform: translateY(0); }
        .drag-handle { width: 45px; height: 6px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 25px auto; }

        /* ACTION MENU */
        .action-menu-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .action-menu { background: white; width: 280px; border-radius: 32px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .action-menu button { width: 100%; padding: 14px; border: none; background: #f8fafc; border-radius: 18px; display: flex; align-items: center; gap: 12px; font-weight: 700; color: #334155; }
        .btn-delete { color: #ef4444 !important; background: #fef2f2 !important; }

        /* FAB */
        .fab-container { position: fixed; bottom: 30px; right: 25px; z-index: 800; }
        .btn-fab { width: 64px; height: 64px; background: #3b82f6; color: white; border: none; border-radius: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 24px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 5000; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">Data Tersimpan</div>

    <nav class="navbar">
        <h1 class="logo">Laporan Produksi</h1>
        <button class="btn-sync" onclick="alert('Sinkronisasi...')"><i data-lucide="send" size="20"></i></button>
    </nav>

    <div class="container">
        <!-- Informasi Utama -->
        <div class="card">
            <span class="section-title">Informasi Utama</span>
            <div class="input-group">
                <i data-lucide="calendar" class="input-icon" size="18"></i>
                <input type="date" id="globalTanggal" class="field field-with-icon">
            </div>
            <select id="globalShift" class="field" onchange="updateShiftTime()">
                <option value="" disabled selected>Pilih Shift</option>
                <option value="1">Shift 1 (08:00 - 16:00)</option>
                <option value="2">Shift 2 (16:00 - 00:00)</option>
                <option value="3">Shift 3 (00:00 - 08:00)</option>
            </select>
        </div>

        <!-- Tabel Ringkasan -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px">
                <span class="section-title" style="margin:0">Daftar Produk</span>
                <button onclick="openFullTable()" style="border:none; background:#f1f5f9; color:#3b82f6; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                    <i data-lucide="maximize" size="18"></i>
                </button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Produk</th><th>Versi</th><th>Karung</th><th>Line</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Tombol Tambah (FAB) -->
    <div class="fab-container">
        <button class="btn-fab" onclick="openModal()">
            <i data-lucide="plus" size="30"></i>
        </button>
    </div>

    <!-- MODAL FORM -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div class="drag-handle"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 id="modalTitle" style="font-weight:800; font-size:1.1rem">Tambah Produk</h2>
                <button onclick="closeModal('modalOverlay')" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%;"><i data-lucide="x" size="18"></i></button>
            </div>
            <form id="prodForm">
                <input type="hidden" id="editId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <input type="text" id="namaProduk" placeholder="Produk" class="field" required>
                    <input type="text" id="versi" placeholder="Versi" class="field" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <select id="lineBagging" class="field">
                        <option value="Line 1">Line 1</option><option value="Line 2">Line 2</option>
                    </select>
                    <input type="text" id="kavling" placeholder="Kavling" class="field" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <input type="time" id="jamAwal" class="field" required>
                    <input type="time" id="jamAkhir" class="field" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <input type="number" id="labelDari" placeholder="Label Awal" class="field" oninput="calcLabels()">
                    <input type="number" id="labelSampai" placeholder="Label Akhir" class="field field-readonly" readonly>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <input type="number" id="jmlBatch" placeholder="Jumlah Batch" class="field" required>
                    <input type="number" id="jmlKarung" placeholder="Total Karung" class="field" required oninput="calcLabels()">
                </div>
                <button type="submit" style="width:100%; padding:18px; background:#3b82f6; color:white; border:none; border-radius:18px; font-weight:800; margin-top:10px">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <!-- MODAL FULL TABLE -->
    <div class="modal-overlay" id="fullTableOverlay">
        <div class="modal-sheet" style="max-height: 95vh;">
            <div class="drag-handle"></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <h2 style="font-weight:800; font-size:1rem">Detail Semua Produk</h2>
                <button onclick="closeModal('fullTableOverlay')" style="border:none; background:none;"><i data-lucide="x"></i></button>
            </div>
            <div style="overflow-x: auto;">
                <table style="min-width: 600px;">
                    <thead>
                        <tr><th>Jam</th><th>Produk</th><th>Versi</th><th>Line</th><th>Karung</th></tr>
                    </thead>
                    <tbody id="fullTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ACTION MENU -->
    <div id="actionMenuOverlay" class="action-menu-overlay" onclick="this.style.display='none'">
        <div class="action-menu" onclick="event.stopPropagation()">
            <div style="padding: 10px; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Opsi Data</div>
            <button onclick="handleEdit()"><i data-lucide="edit-3" size="18"></i> Edit Data</button>
            <button onclick="handleDelete()" class="btn-delete"><i data-lucide="trash-2" size="18"></i> Hapus Data</button>
        </div>
    </div>

    <script>
        let localData = JSON.parse(localStorage.getItem('prod_v34')) || [];
        let selectedId = null;

        function initApp() {
            lucide.createIcons();
            renderTable();
        }

        function renderTable() {
            const tb = document.getElementById('tableBody');
            if (localData.length === 0) {
                tb.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:#94a3b8">Belum ada data</td></tr>';
                return;
            }
            tb.innerHTML = localData.map(i => `
                <tr onclick="showActions(${i.id})">
                    <td><div style="font-weight:800">${i.namaProduk}</div><div style="font-size:9px; color:#94a3b8">${i.jamAwal}-${i.jamAkhir}</div></td>
                    <td style="color:#64748b">${i.versi}</td>
                    <td style="font-weight:800; color:#3b82f6">${i.jmlKarung}</td>
                    <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:8px; font-size:9px">${i.lineBagging}</span></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function openModal(id = null) {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('modal-open'), 10);
            
            document.getElementById('prodForm').reset();
            if(id) {
                const i = localData.find(x => x.id === id);
                document.getElementById('editId').value = i.id;
                document.getElementById('namaProduk').value = i.namaProduk;
                document.getElementById('versi').value = i.versi;
                document.getElementById('lineBagging').value = i.lineBagging;
                document.getElementById('kavling').value = i.kavling;
                document.getElementById('jamAwal').value = i.jamAwal;
                document.getElementById('jamAkhir').value = i.jamAkhir;
                document.getElementById('labelDari').value = i.labelDari;
                document.getElementById('labelSampai').value = i.labelSampai;
                document.getElementById('jmlBatch').value = i.jmlBatch;
                document.getElementById('jmlKarung').value = i.jmlKarung;
                document.getElementById('modalTitle').innerText = "Edit Produk";
            } else {
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Tambah Produk";
            }
            lucide.createIcons();
        }

        function closeModal(id) {
            const overlay = document.getElementById(id);
            overlay.classList.remove('modal-open');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        function showActions(id) {
            selectedId = id;
            document.getElementById('actionMenuOverlay').style.display = 'flex';
            lucide.createIcons();
        }

        function handleEdit() {
            document.getElementById('actionMenuOverlay').style.display = 'none';
            openModal(selectedId);
        }

        function handleDelete() {
            if(confirm('Hapus data ini?')) {
                localData = localData.filter(x => x.id !== selectedId);
                saveData();
                document.getElementById('actionMenuOverlay').style.display = 'none';
            }
        }

        function openFullTable() {
            document.getElementById('fullTableOverlay').style.display = 'flex';
            const ftb = document.getElementById('fullTableBody');
            ftb.innerHTML = localData.map(i => `
                <tr>
                    <td>${i.jamAwal}-${i.jamAkhir}</td>
                    <td>${i.namaProduk}</td>
                    <td>${i.versi}</td>
                    <td>${i.lineBagging}</td>
                    <td>${i.jmlKarung}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function calcLabels() {
            const dari = parseInt(document.getElementById('labelDari').value) || 0;
            const krg = parseInt(document.getElementById('jmlKarung').value) || 0;
            document.getElementById('labelSampai').value = dari + krg;
        }

        document.getElementById('prodForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const entry = {
                id: id ? parseInt(id) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavling: document.getElementById('kavling').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value
            };

            if(id) {
                const idx = localData.findIndex(x => x.id === parseInt(id));
                localData[idx] = entry;
            } else {
                localData.push(entry);
            }

            saveData();
            closeModal('modalOverlay');
        };

        function saveData() {
            localStorage.setItem('prod_v34', JSON.stringify(localData));
            renderTable();
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
