<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProFlow - Seamless Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
        }

        /* Seamless Input Styling */
        .input-seamless {
            @apply w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all duration-300 text-sm font-medium;
        }

        .input-seamless:focus {
            @apply border-blue-500 bg-white ring-4 ring-blue-50;
        }

        .label-seamless {
            @apply block text-[10px] font-bold text-slate-400 uppercase tracking-[0.1em] mb-1.5 ml-1;
        }

        /* Container Grouping */
        .card-group {
            @apply bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm transition-all;
        }

        /* Prevent auto-zoom & custom time input */
        input, select { font-size: 16px !important; }
        input[type="time"] { @apply text-center; }

        /* Smooth Animation */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased pb-32">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-6 py-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter text-slate-900">PRO<span class="text-blue-600">FLOW</span></h1>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="bg-blue-600 text-white px-5 py-2.5 rounded-2xl font-bold text-xs shadow-lg shadow-blue-100 active:scale-95 transition-all flex items-center gap-2">
                <i data-lucide="send" class="w-4 h-4"></i> KIRIM LAPORAN
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 pt-8">
        <div class="card-group mb-8 space-y-6">
            <div>
                <label class="label-seamless">Tanggal Produksi</label>
                <input type="date" id="globalTanggal" class="input-seamless">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-seamless">Shift</label>
                    <select id="globalShift" class="input-seamless">
                        <option value="1">Shift 1</option>
                        <option value="2">Shift 2</option>
                        <option value="3">Shift 3</option>
                    </select>
                </div>
                <div>
                    <label class="label-seamless">Jam Operasional</label>
                    <div class="flex items-center gap-2">
                        <input type="time" id="globalJamAwal" class="input-seamless !px-2">
                        <input type="time" id="globalJamAkhir" class="input-seamless !px-2">
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-4"></div>

        <div id="emptyState" class="hidden text-center py-20 fade-in">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-50">
                <i data-lucide="inbox" class="text-slate-300 w-8 h-8"></i>
            </div>
            <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Belum ada data masuk</p>
        </div>
    </main>

    <div class="fixed bottom-8 left-0 right-0 px-8 flex justify-center z-40">
        <button onclick="openModal()" class="w-full max-w-md bg-slate-900 text-white py-4.5 rounded-[24px] font-bold shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <i data-lucide="plus-circle" class="w-5 h-5 text-blue-400"></i>
            <span class="tracking-wide">TAMBAH PRODUK</span>
        </button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div class="bg-white w-full sm:max-w-lg rounded-t-[40px] sm:rounded-[32px] shadow-2xl z-50 overflow-hidden flex flex-col max-h-[95vh] fade-in">
            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mt-4 sm:hidden"></div>
            
            <div class="p-8 pt-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-8 border-b border-slate-50 pb-4">
                    <h2 id="modalTitle" class="text-lg font-bold text-slate-800">Rincian Produk</h2>
                    <button onclick="closeModal()" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <form id="prodForm" class="space-y-5">
                    <input type="hidden" id="editId">
                    
                    <div class="space-y-4">
                        <div>
                            <label class="label-seamless">Nama Produk</label>
                            <input type="text" id="namaProduk" required placeholder="Masukkan nama produk..." class="input-seamless">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-seamless">Versi</label>
                                <input type="text" id="versi" required placeholder="v.01" class="input-seamless">
                            </div>
                            <div>
                                <label class="label-seamless">Kavling</label>
                                <input type="text" id="kavlingTujuan" required placeholder="K-01" class="input-seamless">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-seamless">Line Bagging</label>
                                <input type="text" id="lineBagging" required placeholder="Line A" class="input-seamless">
                            </div>
                            <div>
                                <label class="label-seamless text-blue-600">Waktu Proses</label>
                                <div class="flex gap-2">
                                    <input type="time" id="jamAwal" required class="input-seamless !px-1">
                                    <input type="time" id="jamAkhir" required class="input-seamless !px-1">
                                </div>
                            </div>
                        </div>

                        <div class="p-5 bg-blue-50/50 border border-blue-100 rounded-[28px] space-y-4">
                            <label class="label-seamless text-center text-blue-600 !ml-0 border-b border-blue-100 pb-2">Range Nomor Seri Label</label>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="labelDari" placeholder="Dari" required class="input-seamless !bg-white">
                                <input type="text" id="labelSampai" placeholder="Sampai" required class="input-seamless !bg-white">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-seamless">Jumlah Batch</label>
                                <input type="number" id="jmlBatch" required class="input-seamless">
                            </div>
                            <div>
                                <label class="label-seamless text-blue-600">Total Karung</label>
                                <input type="number" id="jmlKarung" required class="input-seamless border-blue-200 font-bold text-blue-600">
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="label-seamless text-red-500">Robek</label>
                                <input type="number" id="jmlRobek" required class="input-seamless border-red-100">
                            </div>
                            <div>
                                <label class="label-seamless">Tap (Kg)</label>
                                <input type="number" step="0.01" id="jmlTap" required class="input-seamless">
                            </div>
                            <div>
                                <label class="label-seamless">Sweep (Kg)</label>
                                <input type="number" step="0.01" id="jmlSweeping" required class="input-seamless">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-4.5 rounded-2xl font-bold shadow-xl shadow-blue-200 mt-4 active:scale-[0.98] transition-all">
                        SIMPAN DATA
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_seamless_v1')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Update Produk";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Rincian Baru";
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_seamless_v1', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach(item => {
                const card = `
                    <div class="bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm relative fade-in">
                        <div class="flex justify-between items-start mb-5">
                            <div>
                                <h4 class="font-bold text-slate-800 text-lg tracking-tight">${item.namaProduk}</h4>
                                <div class="flex gap-2 mt-1.5">
                                    <span class="text-[9px] font-bold px-2.5 py-1 bg-blue-50 text-blue-600 rounded-lg uppercase tracking-wider">${item.versi}</span>
                                    <span class="text-[9px] font-bold px-2.5 py-1 bg-slate-50 text-slate-400 rounded-lg uppercase tracking-wider">${item.lineBagging}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openModal(${item.id})" class="p-2.5 bg-slate-50 rounded-2xl text-slate-400 active:text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2.5 bg-slate-50 rounded-2xl text-slate-400 active:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-5">
                            <div class="text-center p-3 bg-slate-50 rounded-[20px]">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Karung</p>
                                <p class="text-base font-bold text-blue-600">${item.jmlKarung}</p>
                            </div>
                            <div class="text-center p-3 bg-slate-50 rounded-[20px]">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Robek</p>
                                <p class="text-base font-bold text-red-500">${item.jmlRobek}</p>
                            </div>
                            <div class="text-center p-3 bg-slate-50 rounded-[20px]">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Batch</p>
                                <p class="text-base font-bold text-slate-700">${item.jmlBatch}</p>
                            </div>
                        </div>

                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 border-t border-slate-50 pt-4">
                            <div class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${item.jamAwal}-${item.jamAkhir}</div>
                            <div class="bg-slate-900 text-white px-2 py-1 rounded-lg text-[9px] font-mono tracking-tighter">${item.labelDari}..</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_seamless_v1', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Belum ada data.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Data Berhasil Sinkron!");
                localData = [];
                localStorage.removeItem('prod_seamless_v1');
                render();
            } catch (e) { alert("Gagal Kirim Data."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> KIRIM LAPORAN`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
