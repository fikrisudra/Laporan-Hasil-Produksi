<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProFlow - Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-app: #fcfdfe;
            --primary: #2563eb;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-app);
            -webkit-tap-highlight-color: transparent;
        }

        /* --- CARD STYLE INPUTS --- */
        .input-card-group {
            @apply bg-slate-50/80 border border-slate-200/60 rounded-[28px] p-4 transition-all duration-300;
        }
        .input-card-group:focus-within {
            @apply bg-white border-blue-500 ring-[6px] ring-blue-500/5 shadow-xl shadow-blue-500/5;
        }

        .input-minimal {
            @apply w-full bg-transparent outline-none text-[16px] font-bold text-slate-800 placeholder:text-slate-300 placeholder:font-medium py-1;
        }

        .input-label {
            @apply block text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] mb-1;
        }

        /* --- BUTTON EVOLUTION --- */
        .btn-action {
            @apply relative overflow-hidden flex items-center justify-center gap-3 h-16 rounded-[24px] font-black text-sm transition-all duration-300 active:scale-[0.94];
        }

        .btn-primary {
            @apply bg-slate-900 text-white shadow-[0_20px_40px_-12px_rgba(15,23,42,0.3)];
        }

        .btn-sync {
            @apply bg-white border border-slate-100 text-slate-900 px-4 py-2 rounded-2xl font-extrabold text-[10px] tracking-widest shadow-sm active:bg-slate-50 transition-all uppercase;
        }

        /* --- LIST CARD ANIMATION --- */
        @keyframes cardPop {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-card { animation: cardPop 0.5s cubic-bezier(0.17, 0.67, 0.16, 0.99) both; }

        /* Custom Scroll Control */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased pb-44">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-2xl border-b border-slate-50 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest leading-none mb-1">Live Monitor</span>
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter italic">ProFlow<span class="text-blue-600">.</span></h1>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="btn-sync">
                <i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-blue-600"></i>
                Sync Data
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 mt-8">
        <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-[0_25px_60px_-15px_rgba(0,0,0,0.03)] mb-10">
            <div class="flex items-center gap-3 mb-8">
                <div class="p-3 bg-blue-50 rounded-2xl text-blue-600"><i data-lucide="calendar-days" class="w-5 h-5"></i></div>
                <h3 class="text-sm font-black text-slate-800 tracking-tight">Informasi Dasar</h3>
            </div>
            <div class="space-y-6">
                <div class="input-card-group">
                    <label class="input-label">Tanggal Produksi</label>
                    <input type="date" id="globalTanggal" class="input-minimal">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-card-group">
                        <label class="input-label">Shift</label>
                        <select id="globalShift" class="input-minimal">
                            <option value="1">Shift 01</option>
                            <option value="2">Shift 02</option>
                            <option value="3">Shift 03</option>
                        </select>
                    </div>
                    <div class="input-card-group">
                        <label class="input-label">Durasi</label>
                        <div class="flex gap-2">
                            <input type="time" id="globalJamAwal" class="input-minimal !text-xs">
                            <input type="time" id="globalJamAkhir" class="input-minimal !text-xs">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-5"></div>

        <div id="emptyState" class="hidden text-center py-20 bg-slate-50/50 rounded-[40px] border-2 border-dashed border-slate-200">
            <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                <i data-lucide="inbox" class="text-slate-300 w-8 h-8"></i>
            </div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em]">Data produksi belum diinput</p>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white/90 to-transparent z-40">
        <div class="max-w-xl mx-auto">
            <button onclick="openModal()" class="w-full btn-action btn-primary group">
                <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg group-active:scale-90 transition-transform">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </div>
                <span class="tracking-widest uppercase">Input Produk Baru</span>
            </button>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-end justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity duration-500" id="overlay" onclick="closeModal()"></div>
        
        <div class="bg-white w-full max-w-2xl rounded-t-[50px] shadow-2xl z-[70] transform translate-y-full transition-transform duration-500 ease-out flex flex-col max-h-[95vh]" id="sheet">
            <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mt-6 mb-2"></div>
            
            <div class="p-8 pt-4 overflow-y-auto pb-12">
                <div class="flex justify-between items-center mb-10">
                    <div class="flex flex-col">
                        <h2 id="modalTitle" class="text-2xl font-black text-slate-900">Input Rincian</h2>
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Entry Sheet #PRO-01</span>
                    </div>
                    <button onclick="closeModal()" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 active:bg-red-50 active:text-red-500 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>

                <form id="prodForm" class="space-y-6">
                    <input type="hidden" id="editId">
                    
                    <div class="input-card-group !bg-slate-50/40">
                        <label class="input-label">Identitas Barang</label>
                        <input type="text" id="namaProduk" required placeholder="Nama Produk (Urea/NPK)" class="input-minimal border-b border-slate-100 mb-4 pb-2">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="versi" required placeholder="Versi" class="input-minimal border-b border-slate-100">
                            <input type="text" id="kavlingTujuan" required placeholder="Kavling" class="input-minimal border-b border-slate-100">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-card-group">
                            <label class="input-label">Line Bagging</label>
                            <input type="text" id="lineBagging" required placeholder="Line A" class="input-minimal">
                        </div>
                        <div class="input-card-group">
                            <label class="input-label">Waktu</label>
                            <div class="flex gap-1 h-full items-center">
                                <input type="time" id="jamAwal" required class="input-minimal !text-[13px] text-center">
                                <span class="text-slate-300">-</span>
                                <input type="time" id="jamAkhir" required class="input-minimal !text-[13px] text-center">
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-600 rounded-[32px] p-6 text-white shadow-xl shadow-blue-200">
                        <label class="block text-[10px] font-black text-blue-200 uppercase tracking-widest mb-4 text-center">Nomor Seri Label</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="labelDari" placeholder="Dari" required class="w-full bg-white/10 border border-white/20 rounded-2xl h-14 px-4 outline-none font-bold placeholder:text-white/40 focus:bg-white/20 transition-all">
                            <input type="text" id="labelSampai" placeholder="Sampai" required class="w-full bg-white/10 border border-white/20 rounded-2xl h-14 px-4 outline-none font-bold placeholder:text-white/40 focus:bg-white/20 transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-card-group">
                            <label class="input-label text-blue-600">Total Karung</label>
                            <input type="number" id="jmlKarung" required placeholder="000" class="input-minimal text-blue-600">
                        </div>
                        <div class="input-card-group">
                            <label class="input-label">Batch</label>
                            <input type="number" id="jmlBatch" required placeholder="0" class="input-minimal">
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="input-card-group !p-3">
                            <label class="input-label text-red-500 !text-[8px]">Robek</label>
                            <input type="number" id="jmlRobek" required class="input-minimal text-red-500">
                        </div>
                        <div class="input-card-group !p-3">
                            <label class="input-label !text-[8px]">Tap</label>
                            <input type="number" step="0.01" id="jmlTap" required class="input-minimal">
                        </div>
                        <div class="input-card-group !p-3">
                            <label class="input-label !text-[8px]">Sweep</label>
                            <input type="number" step="0.01" id="jmlSweeping" required class="input-minimal">
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-action btn-primary !h-18 mt-4 shadow-blue-200">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        <span>SIMPAN RINCIAN PRODUK</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v6_mobile')) || [];

        function openModal(editId = null) {
            const modal = document.getElementById('modal');
            const sheet = document.getElementById('sheet');
            modal.classList.remove('hidden');
            setTimeout(() => sheet.classList.remove('translate-y-full'), 10);

            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Data";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Input Rincian";
            }
        }

        function closeModal() {
            const sheet = document.getElementById('sheet');
            sheet.classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 500);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v6_mobile', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach((item, index) => {
                const card = `
                    <div class="animate-card bg-white rounded-[40px] p-7 border border-slate-100 shadow-[0_15px_45px_rgba(0,0,0,0.02)] active:scale-[0.97] transition-all" style="animation-delay: ${index * 0.1}s">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 bg-slate-900 rounded-[22px] flex items-center justify-center text-white shadow-xl shadow-slate-200">
                                    <i data-lucide="package" class="w-7 h-7"></i>
                                </div>
                                <div>
                                    <h4 class="font-black text-slate-800 text-[18px] tracking-tight">${item.namaProduk}</h4>
                                    <div class="flex gap-2 mt-1">
                                        <span class="bg-blue-50 text-blue-600 text-[9px] font-black px-2 py-0.5 rounded-md uppercase">${item.lineBagging}</span>
                                        <span class="bg-slate-50 text-slate-400 text-[9px] font-black px-2 py-0.5 rounded-md uppercase">${item.versi}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-3 bg-slate-50 rounded-2xl text-slate-400 active:text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-3 bg-slate-50 rounded-2xl text-slate-400 active:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 mb-6">
                            <div class="bg-blue-50/30 rounded-[22px] p-4 text-center border border-blue-50">
                                <span class="block text-[8px] font-black text-blue-400 uppercase mb-1">Karung</span>
                                <span class="text-[18px] font-black text-blue-600">${item.jmlKarung}</span>
                            </div>
                            <div class="bg-red-50/30 rounded-[22px] p-4 text-center border border-red-50">
                                <span class="block text-[8px] font-black text-red-400 uppercase mb-1">Robek</span>
                                <span class="text-[18px] font-black text-red-500">${item.jmlRobek}</span>
                            </div>
                            <div class="bg-slate-50/50 rounded-[22px] p-4 text-center border border-slate-100">
                                <span class="block text-[8px] font-black text-slate-400 uppercase mb-1">Batch</span>
                                <span class="text-[18px] font-black text-slate-800">${item.jmlBatch}</span>
                            </div>
                        </div>

                        <div class="flex justify-between items-center text-[11px] font-bold text-slate-400 px-2">
                            <div class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-4 h-4 text-blue-500"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1.5"><i data-lucide="hash" class="w-4 h-4 text-blue-500"></i> Label ${item.labelDari}</div>
                            <div class="flex items-center gap-1.5"><i data-lucide="clock" class="w-4 h-4 text-blue-500"></i> ${item.jamAwal}</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v6_mobile', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal Laporan!");
            if(localData.length === 0) return alert("Belum ada data.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> Sending...`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Sinkronisasi Selesai!");
                localData = [];
                localStorage.removeItem('prod_v6_mobile');
                render();
            } catch (e) { alert("Error: Periksa Koneksi Internet."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-blue-600"></i> Sync Data`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
