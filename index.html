<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProFlow Hybrid Clean</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* CORE RESET - Menjamin tampilan konsisten di Chrome Mobile */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; color: #1e293b; line-height: 1.5; padding-bottom: 100px; }
        
        /* HEADER - Pro Look */
        .navbar { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; items-center; border-bottom: 1px solid #e2e8f0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.25rem; letter-spacing: -1px; display: flex; items: center; gap: 8px; }
        .logo span { color: #2563eb; }

        /* BUTTONS - Tactile & Responsive */
        .btn-send { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-fab { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #0f172a; color: white; border: none; height: 60px; border-radius: 20px; font-weight: 800; letter-spacing: 1px; display: flex; items: center; justify-content: center; gap: 10px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); z-index: 90; cursor: pointer; }

        /* CARDS - Clean Card Style */
        .container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* INPUT FIELDS - Hybrid UI */
        .input-group { margin-bottom: 15px; }
        .label { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; padding-left: 4px; }
        .field { width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 14px; padding: 12px 15px; font-size: 15px; font-weight: 700; color: #334155; transition: 0.2s; outline: none; }
        .field:focus { border-color: #2563eb; background: white; }

        /* MODAL - Solid Structure */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: flex-end; justify-content: center; z-index: 200; }
        .modal-sheet { background: white; width: 100%; max-width: 600px; border-radius: 32px 32px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease-out; }
        .modal-open .modal-sheet { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* GRID SYSTEM */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        /* ITEM LIST STYLING */
        .list-item { background: white; border-radius: 24px; padding: 20px; margin-bottom: 12px; border-left: 5px solid #2563eb; position: relative; }
        .item-info { display: flex; gap: 12px; margin-bottom: 15px; }
        .item-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .stat-box { background: #f1f5f9; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-weight: 800; font-size: 16px; }
        .stat-lbl { font-size: 8px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i data-lucide="shield-check"></i> ProFlow<span>.</span></div>
        <button class="btn-send" onclick="sendToBackend()" id="btnKirim">
            <i data-lucide="send"></i> KIRIM
        </button>
    </nav>

    <div class="container">
        <div class="card">
            <span class="label">Informasi Sesi</span>
            <div class="input-group">
                <input type="date" id="globalTanggal" class="field">
            </div>
            <div class="grid-2">
                <select id="globalShift" class="field">
                    <option value="1">Shift 01</option>
                    <option value="2">Shift 02</option>
                    <option value="3">Shift 03</option>
                </select>
                <div class="grid-2" style="gap:5px">
                    <input type="time" id="globalJamAwal" class="field" style="padding:10px 5px; font-size:12px">
                    <input type="time" id="globalJamAkhir" class="field" style="padding:10px 5px; font-size:12px">
                </div>
            </div>
        </div>

        <div id="listBody"></div>
        <div id="emptyState" style="text-align:center; padding:50px; opacity:0.3">
            <i data-lucide="database" style="width:40px; height:40px; margin-bottom:10px"></i>
            <p style="font-weight:700; font-size:12px">ANTRIAN KOSONG</p>
        </div>
    </div>

    <button class="btn-fab" onclick="openModal()">
        <i data-lucide="plus-circle"></i> TAMBAH DATA PRODUK
    </button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div class="modal-header">
                <h2 style="font-weight:800; font-size:1.2rem">Detail Produksi</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:#cbd5e1"><i data-lucide="x"></i></button>
            </div>
            
            <form id="prodForm">
                <input type="hidden" id="editId">
                <div class="input-group">
                    <label class="label">Nama Produk</label>
                    <input type="text" id="namaProduk" required placeholder="Contoh: Urea" class="field">
                </div>
                
                <div class="grid-2">
                    <div class="input-group">
                        <label class="label">Versi</label>
                        <input type="text" id="versi" required placeholder="v1.x" class="field">
                    </div>
                    <div class="input-group">
                        <label class="label">Kavling</label>
                        <input type="text" id="kavlingTujuan" required placeholder="Kav A" class="field">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label class="label">Line</label>
                        <input type="text" id="lineBagging" required class="field">
                    </div>
                    <div class="input-group">
                        <label class="label">Jam</label>
                        <div class="grid-2" style="gap:5px">
                            <input type="time" id="jamAwal" required class="field" style="padding:12px 5px; font-size:12px">
                            <input type="time" id="jamAkhir" required class="field" style="padding:12px 5px; font-size:12px">
                        </div>
                    </div>
                </div>

                <div style="background:#0f172a; padding:15px; border-radius:18px; margin-bottom:15px">
                    <label class="label" style="color:#60a5fa">Nomor Seri Label</label>
                    <div class="grid-2">
                        <input type="text" id="labelDari" placeholder="Awal" required class="field" style="background:rgba(255,255,255,0.05); color:white; border-color:rgba(255,255,255,0.1)">
                        <input type="text" id="labelSampai" placeholder="Akhir" required class="field" style="background:rgba(255,255,255,0.05); color:white; border-color:rgba(255,255,255,0.1)">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label class="label" style="color:#2563eb">Total Karung</label>
                        <input type="number" id="jmlKarung" required class="field" style="background:#eff6ff; border-color:#dbeafe">
                    </div>
                    <div class="input-group">
                        <label class="label">Jumlah Batch</label>
                        <input type="number" id="jmlBatch" required class="field">
                    </div>
                </div>

                <div class="grid-3">
                    <div class="input-group">
                        <label class="label" style="color:#ef4444">Robek</label>
                        <input type="number" id="jmlRobek" required class="field">
                    </div>
                    <div class="input-group">
                        <label class="label">Tap</label>
                        <input type="number" step="0.01" id="jmlTap" required class="field">
                    </div>
                    <div class="input-group">
                        <label class="label">Sweep</label>
                        <input type="number" step="0.01" id="jmlSweeping" required class="field">
                    </div>
                </div>

                <button type="submit" style="width:100%; height:55px; background:#2563eb; color:white; border:none; border-radius:15px; font-weight:800; margin-top:10px">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v10')) || [];

        function openModal(editId = null) {
            const modal = document.getElementById('modalOverlay');
            modal.style.display = 'flex';
            setTimeout(() => document.body.classList.add('modal-open'), 10);

            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
            }
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v10', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.style.display = 'block';
            else emptyState.style.display = 'none';

            localData.forEach((item) => {
                const card = `
                    <div class="list-item">
                        <div style="position:absolute; right:15px; top:15px; display:flex; gap:8px">
                            <button onclick="openModal(${item.id})" style="border:none; background:none; color:#94a3b8"><i data-lucide="edit-2" style="width:18px"></i></button>
                            <button onclick="removeItem(${item.id})" style="border:none; background:none; color:#ef4444"><i data-lucide="trash" style="width:18px"></i></button>
                        </div>
                        <div class="item-info">
                            <div style="width:45px; height:45px; background:#f1f5f9; border-radius:12px; display:flex; align-items:center; justify-content:center"><i data-lucide="package" style="color:#2563eb"></i></div>
                            <div>
                                <h4 style="font-weight:800; font-size:16px">${item.namaProduk}</h4>
                                <p style="font-size:10px; font-weight:700; color:#94a3b8">${item.lineBagging} • ${item.versi}</p>
                            </div>
                        </div>
                        <div class="item-stats">
                            <div class="stat-box"><span class="stat-lbl">Karung</span><span class="stat-val" style="color:#2563eb">${item.jmlKarung}</span></div>
                            <div class="stat-box"><span class="stat-lbl">Robek</span><span class="stat-val" style="color:#ef4444">${item.jmlRobek}</span></div>
                            <div class="stat-box"><span class="stat-lbl">Batch</span><span class="stat-val">${item.jmlBatch}</span></div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v10', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Data kosong.");
            
            const btn = document.getElementById('btnKirim');
            btn.innerHTML = "...";
            try {
                for (const item of localData) {
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify({...item, tanggal: tgl, shift: shf}) });
                }
                alert("Berhasil!");
                localData = [];
                localStorage.removeItem('prod_v10');
                render();
            } catch (e) { alert("Error!"); }
            finally { btn.innerHTML = "KIRIM"; }
        }
        window.onload = render;
    </script>
</body>
</html>
