<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sistem Laporan Produksi v34.5 - Professional Grade</title>
    
    <!-- FONTS & ICON PACKS -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 
           ========================================
           CORE STYLING - UI/UX ARCHITECTURE
           ========================================
        */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-600: #475569;
            --slate-800: #1e293b;
            --radius-xl: 32px;
            --radius-l: 22px;
            --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body { 
            overscroll-behavior-y: none; 
            height: 100%; 
            background-color: var(--slate-50); 
            color: var(--slate-800);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.5;
        }

        /* NAVBAR DESIGN */
        .navbar { 
            position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--slate-200); z-index: 1000; 
        }
        .nav-info h1 { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; color: var(--slate-800); }
        .nav-info p { font-size: 10px; color: var(--slate-400); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .btn-icon {
            width: 45px; height: 45px; border-radius: 14px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: var(--slate-100); color: var(--slate-600);
            transition: var(--transition); cursor: pointer;
        }
        .btn-icon:active { transform: scale(0.9); background: var(--slate-200); }

        /* CONTAINER & LAYOUT */
        .container { max-width: 650px; margin: 0 auto; padding: 20px; }
        
        .card { 
            background: white; border-radius: var(--radius-xl); padding: 28px; 
            box-shadow: var(--shadow-soft); margin-bottom: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative; overflow: hidden;
        }

        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 22px; 
        }
        .section-title { 
            font-size: 12px; font-weight: 800; color: var(--slate-400); 
            text-transform: uppercase; letter-spacing: 1.5px; 
        }

        /* FORM ELEMENTS - POPUP VERSION */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .full-width { grid-column: span 2; }
        
        .input-box { position: relative; width: 100%; }
        .input-label { 
            font-size: 11px; font-weight: 700; color: var(--slate-600); 
            margin-bottom: 8px; display: block; margin-left: 6px;
        }
        
        .field { 
            width: 100%; background: var(--slate-50); border: 2.5px solid var(--slate-100); 
            border-radius: 18px; padding: 16px 20px; font-size: 14px; font-weight: 600; 
            color: var(--slate-800); outline: none; transition: var(--transition);
        }
        .field:focus { 
            border-color: var(--primary); background: white; 
            box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.1); 
        }
        .field-readonly { background: var(--slate-100); color: var(--slate-400); border-style: dashed; }

        /* TABLE SYSTEM - JAM HEADER IS BACK */
        .table-container { width: 100%; border-radius: 24px; border: 1px solid var(--slate-100); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: var(--slate-50); padding: 16px; font-size: 10px; 
            font-weight: 800; color: var(--slate-400); text-transform: uppercase; 
            text-align: left; border-bottom: 2px solid var(--slate-100); 
        }
        td { padding: 20px 16px; border-bottom: 1px solid var(--slate-100); vertical-align: middle; }

        /* INTERACTION: LONG PRESS & SWIPE */
        .row-item { 
            transition: var(--transition); cursor: pointer; position: relative; 
            background: white; -webkit-user-select: none; user-select: none;
        }
        .row-item:active { background: var(--slate-50); }
        .row-item.long-press-active { animation: pulse 0.5s infinite; background: #eff6ff; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.99); }
            100% { transform: scale(1); }
        }

        /* MODAL ARCHITECTURE - SWIPE DOWN TO CLOSE */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px); display: none; align-items: flex-end; z-index: 5000; 
        }
        .modal-sheet { 
            background: white; width: 100%; border-radius: 40px 40px 0 0; padding: 20px 28px 45px 28px; 
            max-height: 96vh; overflow-y: auto; position: relative;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            touch-action: none; /* Required for custom swipe handling */
        }
        .modal-open .modal-sheet { transform: translateY(0); }
        
        .handle-wrapper { 
            width: 100%; height: 30px; display: flex; align-items: center; 
            justify-content: center; margin-bottom: 10px; cursor: grab;
        }
        .drag-handle { width: 50px; height: 6px; background: var(--slate-200); border-radius: 10px; }

        /* FAB SYSTEM */
        .btn-fab { 
            position: fixed; bottom: 40px; right: 25px; width: 75px; height: 75px; 
            background: var(--slate-800); color: white; border: none; border-radius: 26px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.5); z-index: 2000;
        }

        /* ACTION MENU (POPUP OPSI) */
        .action-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            display: none; align-items: center; justify-content: center; z-index: 6000;
        }
        .action-content {
            background: white; width: 280px; border-radius: 30px; padding: 15px;
            animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .opt-btn {
            width: 100%; padding: 16px; border: none; background: transparent;
            border-radius: 20px; display: flex; align-items: center; gap: 12px;
            font-weight: 700; color: var(--slate-800); font-size: 14px; margin-bottom: 5px;
        }
        .opt-btn:active { background: var(--slate-100); }
        .opt-delete { color: var(--danger); }

        #toast { 
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: var(--slate-800); color: white; padding: 16px 32px; border-radius: 22px; 
            font-size: 14px; font-weight: 700; transition: var(--transition); z-index: 9999;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast">Berhasil diperbarui</div>

    <!-- MAIN NAVBAR -->
    <nav class="navbar">
        <div class="nav-info">
            <h1>PRODUKSI MASTER</h1>
            <p id="displayShift">MEMUAT DATA...</p>
        </div>
        <div style="display:flex; gap:10px">
            <button class="btn-icon" onclick="exportData()"><i data-lucide="download" size="20"></i></button>
            <button class="btn-icon" style="background: var(--primary); color: white;" onclick="location.reload()">
                <i data-lucide="refresh-cw" size="20"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- GLOBAL CONFIG CARD -->
        <div class="card">
            <span class="section-title">Konfigurasi Global</span>
            <div class="form-grid" style="margin-top: 15px;">
                <div class="input-box">
                    <label class="input-label">Tanggal Laporan</label>
                    <input type="date" id="globalTanggal" class="field" onchange="updateInfo()">
                </div>
                <div class="input-box">
                    <label class="input-label">Shift Kerja</label>
                    <select id="globalShift" class="field" onchange="updateInfo()">
                        <option value="1">Shift 1 (Pagi)</option>
                        <option value="2">Shift 2 (Sore)</option>
                        <option value="3">Shift 3 (Malam)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- MAIN DATA TABLE CARD -->
        <div class="card">
            <div class="section-header">
                <span class="section-title">Hasil Produksi (Tap & Tahan)</span>
                <i data-lucide="info" size="16" style="color: var(--slate-400)"></i>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu (Jam)</th> <!-- JAM HEADER IS HERE -->
                            <th>Produk</th>
                            <th>L / K</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- FAB -->
    <button class="btn-fab" onclick="openModal()">
        <i data-lucide="plus" size="35"></i>
    </button>

    <!-- FORM MODAL (TAP, SWEEP, ROBEK INCLUDED) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <!-- SWIPE DOWN HANDLE -->
            <div class="handle-wrapper" id="swipeHandle">
                <div class="drag-handle"></div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
                <div>
                    <h2 id="modalTitle" style="font-weight:800; font-size:1.4rem; letter-spacing:-0.8px">Data Baru</h2>
                    <p style="font-size:11px; color:var(--slate-400); font-weight:700;">LENGKAPI PARAMETER PRODUKSI</p>
                </div>
                <button onclick="closeModal()" style="border:none; background:var(--slate-100); width:44px; height:44px; border-radius:50%;"><i data-lucide="x" size="22"></i></button>
            </div>

            <form id="prodForm">
                <input type="hidden" id="editId">
                
                <div class="form-grid">
                    <div class="input-box">
                        <label class="input-label">Nama Produk</label>
                        <input type="text" id="p_nama" class="field" placeholder="Nama Barang" required>
                    </div>
                    <div class="input-box">
                        <label class="input-label">Versi Produk</label>
                        <input type="text" id="p_versi" class="field" placeholder="Contoh: V2" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-box">
                        <label class="input-label">Line Produksi</label>
                        <select id="p_line" class="field">
                            <option value="L1">Line 1</option>
                            <option value="L2">Line 2</option>
                            <option value="L3">Line 3</option>
                            <option value="L4">Line 4</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label class="input-label">Kavling</label>
                        <input type="text" id="p_kav" class="field" placeholder="A1/B2" required>
                    </div>
                </div>

                <!-- SPECIAL FIELDS: TAP, SWEEP, ROBEK (LAYOUT FIXED) -->
                <div style="background: var(--slate-50); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 2px solid var(--slate-100);">
                    <span class="section-title" style="margin-bottom: 15px; display: block; color: var(--primary);">Data Kalkulasi</span>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                        <div class="input-box">
                            <label class="input-label" style="color:var(--primary)">TAP</label>
                            <input type="number" id="p_tap" class="field" value="0" oninput="calcTotal()">
                        </div>
                        <div class="input-box">
                            <label class="input-label" style="color:var(--success)">SWEEP</label>
                            <input type="number" id="p_sweep" class="field" value="0" oninput="calcTotal()">
                        </div>
                        <div class="input-box">
                            <label class="input-label" style="color:var(--danger)">ROBEK</label>
                            <input type="number" id="p_robek" class="field" value="0" oninput="calcTotal()">
                        </div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-box">
                        <label class="input-label">Waktu Mulai</label>
                        <input type="time" id="p_jam1" class="field" required>
                    </div>
                    <div class="input-box">
                        <label class="input-label">Waktu Selesai</label>
                        <input type="time" id="p_jam2" class="field" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-box">
                        <label class="input-label">Label Awal</label>
                        <input type="number" id="p_label1" class="field" required oninput="calcTotal()">
                    </div>
                    <div class="input-box">
                        <label class="input-label">Label Akhir</label>
                        <input type="number" id="p_label2" class="field field-readonly" readonly>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-box">
                        <label class="input-label">Jml Batch</label>
                        <input type="number" id="p_batch" class="field" required>
                    </div>
                    <div class="input-box">
                        <label class="input-label">Total Karung</label>
                        <input type="number" id="p_karung" class="field" required oninput="calcTotal()">
                    </div>
                </div>

                <button type="submit" class="field" style="background: var(--slate-800); color: white; border: none; height: 65px; font-weight: 800; font-size: 16px; margin-top: 10px;">
                    SIMPAN LAPORAN
                </button>
            </form>
        </div>
    </div>

    <!-- ACTION MENU OVERLAY -->
    <div class="action-menu" id="actionMenu" onclick="closeAction()">
        <div class="action-content" onclick="event.stopPropagation()">
            <div style="padding: 10px 15px; border-bottom: 1px solid var(--slate-100); margin-bottom: 10px;">
                <p style="font-size: 10px; font-weight: 800; color: var(--slate-400); text-transform: uppercase;">Pilih Tindakan</p>
            </div>
            <button class="opt-btn" onclick="triggerEdit()"><i data-lucide="edit-3"></i> Ubah Data</button>
            <button class="opt-btn opt-delete" onclick="triggerDelete()"><i data-lucide="trash-2"></i> Hapus Permanen</button>
            <button class="opt-btn" onclick="closeAction()" style="margin-top:10px; color: var(--slate-400); font-weight: 600;">Batal</button>
        </div>
    </div>

    <script>
        /* 
           ========================================
           CORE LOGIC - 500+ LINES OF JS STABILITY
           ========================================
        */
        
        let db = JSON.parse(localStorage.getItem('master_db_v34_5')) || [];
        let selectedId = null;
        let pressTimer = null;

        // --- APP INITIALIZATION ---
        window.onload = () => {
            lucide.createIcons();
            setDefaultDate();
            updateInfo();
            renderData();
            setupSwipeToClose();
        };

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('globalTanggal').value = today;
        }

        function updateInfo() {
            const tgl = document.getElementById('globalTanggal').value;
            const shift = document.getElementById('globalShift').value;
            document.getElementById('displayShift').innerText = `TGL: ${tgl} • SHIFT ${shift}`;
        }

        // --- DATA ENGINE ---
        function calcTotal() {
            const lAwal = parseInt(document.getElementById('p_label1').value) || 0;
            const karung = parseInt(document.getElementById('p_karung').value) || 0;
            document.getElementById('p_label2').value = lAwal + karung;
        }

        function renderData() {
            const tbody = document.getElementById('tableBody');
            if (db.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:60px; color:var(--slate-400);">Belum ada data produksi.</td></tr>`;
                return;
            }

            tbody.innerHTML = db.map(item => `
                <tr class="row-item" 
                    id="row-${item.id}"
                    onmousedown="startPress(${item.id})" 
                    onmouseup="cancelPress()" 
                    onmouseleave="cancelPress()"
                    ontouchstart="startPress(${item.id})" 
                    ontouchend="cancelPress()"
                    onclick="handleQuickTap(${item.id})">
                    <td style="font-family:'JetBrains Mono'; font-weight:700; color:var(--primary);">
                        ${item.jam1}<br><span style="color:var(--slate-400); font-size:9px;">s/d ${item.jam2}</span>
                    </td>
                    <td>
                        <div style="font-weight:800; font-size:13px;">${item.produk}</div>
                        <div style="font-size:10px; color:var(--slate-400);">Ver: ${item.versi}</div>
                    </td>
                    <td>
                        <span class="badge" style="background:var(--slate-100); padding:4px 8px; border-radius:8px; font-size:10px; font-weight:800;">${item.line}</span>
                        <div style="font-size:9px; color:var(--slate-400); margin-top:3px;">KAV: ${item.kav}</div>
                    </td>
                    <td style="text-align:right;">
                        <div style="font-weight:800; color:var(--slate-800); font-size:15px;">${item.karung}</div>
                        <div style="font-size:8px; color:var(--slate-400);">T:${item.tap} S:${item.sweep} R:${item.robek}</div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        // --- GESTURE SYSTEM (SWIPE & LONG PRESS) ---
        function startPress(id) {
            cancelPress();
            pressTimer = setTimeout(() => {
                selectedId = id;
                document.getElementById(`row-${id}`).classList.add('long-press-active');
                openAction();
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            }, 600); // 0.6 Detik untuk Long Press
        }

        function cancelPress() {
            clearTimeout(pressTimer);
            db.forEach(item => {
                const el = document.getElementById(`row-${item.id}`);
                if(el) el.classList.remove('long-press-active');
            });
        }

        function handleQuickTap(id) {
            // Quick tap hanya memberikan feedback visual atau edit jika diinginkan
            console.log("Tapped:", id);
        }

        function setupSwipeToClose() {
            const sheet = document.getElementById('modalSheet');
            const handle = document.getElementById('swipeHandle');
            let startY = 0;
            let currentY = 0;

            handle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                sheet.style.transition = 'none';
            });

            handle.addEventListener('touchmove', (e) => {
                currentY = e.touches[0].clientY;
                const diff = currentY - startY;
                if (diff > 0) {
                    sheet.style.transform = `translateY(${diff}px)`;
                }
            });

            handle.addEventListener('touchend', (e) => {
                sheet.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
                const diff = currentY - startY;
                if (diff > 150) {
                    closeModal();
                } else {
                    sheet.style.transform = `translateY(0)`;
                }
            });
        }

        // --- MODAL CONTROLS ---
        function openModal(id = null) {
            const overlay = document.getElementById('modalOverlay');
            const form = document.getElementById('prodForm');
            form.reset();
            document.getElementById('editId').value = "";
            document.getElementById('modalTitle').innerText = "Tambah Produk";

            if (id) {
                const data = db.find(x => x.id === id);
                document.getElementById('editId').value = data.id;
                document.getElementById('p_nama').value = data.produk;
                document.getElementById('p_versi').value = data.versi;
                document.getElementById('p_line').value = data.line;
                document.getElementById('p_kav').value = data.kav;
                document.getElementById('p_tap').value = data.tap;
                document.getElementById('p_sweep').value = data.sweep;
                document.getElementById('p_robek').value = data.robek;
                document.getElementById('p_jam1').value = data.jam1;
                document.getElementById('p_jam2').value = data.jam2;
                document.getElementById('p_label1').value = data.label1;
                document.getElementById('p_label2').value = data.label2;
                document.getElementById('p_batch').value = data.batch;
                document.getElementById('p_karung').value = data.karung;
                document.getElementById('modalTitle').innerText = "Ubah Data";
            }

            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('modal-open'), 10);
            lucide.createIcons();
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('modal-open');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('modalSheet').style.transform = 'translateY(0)';
            }, 500);
        }

        // --- ACTION MENU CONTROLS ---
        function openAction() {
            document.getElementById('actionMenu').style.display = 'flex';
        }

        function closeAction() {
            document.getElementById('actionMenu').style.display = 'none';
            cancelPress();
        }

        function triggerEdit() {
            closeAction();
            openModal(selectedId);
        }

        function triggerDelete() {
            if(confirm('Hapus data ini selamanya?')) {
                db = db.filter(x => x.id !== selectedId);
                save();
                closeAction();
                showToast("Data Telah Dihapus");
            }
        }

        // --- FORM SUBMISSION ---
        document.getElementById('prodForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            const entry = {
                id: id ? parseInt(id) : Date.now(),
                produk: document.getElementById('p_nama').value,
                versi: document.getElementById('p_versi').value,
                line: document.getElementById('p_line').value,
                kav: document.getElementById('p_kav').value,
                tap: document.getElementById('p_tap').value,
                sweep: document.getElementById('p_sweep').value,
                robek: document.getElementById('p_robek').value,
                jam1: document.getElementById('p_jam1').value,
                jam2: document.getElementById('p_jam2').value,
                label1: document.getElementById('p_label1').value,
                label2: document.getElementById('p_label2').value,
                batch: document.getElementById('p_batch').value,
                karung: document.getElementById('p_karung').value,
                timestamp: new Date().getTime()
            };

            if(id) {
                const idx = db.findIndex(x => x.id === parseInt(id));
                db[idx] = entry;
            } else {
                db.unshift(entry); // Tambahkan ke paling atas
            }

            save();
            closeModal();
            showToast("Laporan Tersimpan");
        };

        function save() {
            localStorage.setItem('master_db_v34_5', JSON.stringify(db));
            renderData();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
