<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProFlow Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            color: #1e293b;
        }

        /* --- KOTAK ISIAN PROPER --- */
        .field-card {
            background: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            padding: 12px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .field-card:focus-within {
            border-color: #2563eb;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }

        .label-text {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .input-plain {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 700;
            color: #334155;
        }

        /* --- TOMBOL PROPER --- */
        .btn-kirim {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }
        .btn-kirim:active { transform: scale(0.95); opacity: 0.9; }

        .btn-input-baru {
            background: #0f172a;
            color: white;
            width: 100%;
            max-width: 400px;
            height: 64px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.2);
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        /* --- CARD LIST --- */
        .card-item {
            background: white;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin-bottom: 16px;
            animation: slideUp 0.5s ease-out both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Jam */
        .jam-container {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-slate-100 z-50 px-6 py-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg">
                    <i data-lucide="zap" class="text-blue-400 w-5 h-5"></i>
                </div>
                <span class="text-xl font-black italic tracking-tighter">ProFlow<span class="text-blue-600">.</span></span>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="btn-kirim uppercase">
                <i data-lucide="send" class="w-4 h-4"></i> Kirim Data
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">
        <div class="mb-10">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1.5 h-5 bg-blue-600 rounded-full"></div>
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Metadata Sesi</h2>
            </div>

            <div class="space-y-4">
                <div class="field-card">
                    <label class="label-text">Tanggal Operasional</label>
                    <input type="date" id="globalTanggal" class="input-plain">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="field-card">
                        <label class="label-text">Pilih Shift</label>
                        <select id="globalShift" class="input-plain">
                            <option value="1">Shift 01</option>
                            <option value="2">Shift 02</option>
                            <option value="3">Shift 03</option>
                        </select>
                    </div>
                    <div class="field-card">
                        <label class="label-text">Target Jam</label>
                        <div class="flex gap-1">
                            <input type="time" id="globalJamAwal" class="input-plain !text-[13px]">
                            <input type="time" id="globalJamAkhir" class="input-plain !text-[13px]">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody"></div>

        <div id="emptyState" class="py-20 text-center border-2 border-dashed border-slate-200 rounded-[40px] bg-slate-50">
            <i data-lucide="layout-grid" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Belum ada rincian produksi</p>
        </div>
    </main>

    <button onclick="openModal()" class="btn-input-baru">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg">
            <i data-lucide="plus" class="w-5 h-5"></i>
        </div>
        INPUT PRODUK BARU
    </button>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-end justify-center">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeModal()"></div>
        <div id="sheet" class="bg-white w-full max-w-xl rounded-t-[40px] z-[70] p-8 pb-12 transform translate-y-full transition-transform duration-300">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            
            <h2 class="text-2xl font-black text-slate-900 mb-8" id="modalTitle">Tambah Rincian</h2>
            
            <form id="prodForm" class="space-y-5">
                <input type="hidden" id="editId">
                
                <div class="field-card">
                    <label class="label-text">Nama Produk</label>
                    <input type="text" id="namaProduk" required placeholder="Contoh: Urea Prill" class="input-plain">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="field-card">
                        <label class="label-text">Versi</label>
                        <input type="text" id="versi" required class="input-plain">
                    </div>
                    <div class="field-card">
                        <label class="label-text">Kavling</label>
                        <input type="text" id="kavlingTujuan" required class="input-plain">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="field-card">
                        <label class="label-text">Line Bagging</label>
                        <input type="text" id="lineBagging" required class="input-plain">
                    </div>
                    <div class="field-card">
                        <label class="label-text">Jam Produksi</label>
                        <div class="flex gap-1">
                            <input type="time" id="jamAwal" required class="input-plain !text-[13px]">
                            <input type="time" id="jamAkhir" required class="input-plain !text-[13px]">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[28px] space-y-4">
                    <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Seri Label</label>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="labelDari" placeholder="Awal" required class="bg-white/10 border border-white/10 h-12 rounded-xl px-4 text-white font-bold outline-none focus:border-blue-500">
                        <input type="text" id="labelSampai" placeholder="Akhir" required class="bg-white/10 border border-white/10 h-12 rounded-xl px-4 text-white font-bold outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="field-card !bg-blue-50/50 border-blue-100">
                        <label class="label-text text-blue-600">Total Karung</label>
                        <input type="number" id="jmlKarung" required class="input-plain text-blue-600">
                    </div>
                    <div class="field-card">
                        <label class="label-text">Batch</label>
                        <input type="number" id="jmlBatch" required class="input-plain">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="field-card !p-3">
                        <label class="label-text text-red-500 !text-[8px]">Robek</label>
                        <input type="number" id="jmlRobek" required class="input-plain text-red-500">
                    </div>
                    <div class="field-card !p-3">
                        <label class="label-text !text-[8px]">Tap</label>
                        <input type="number" step="0.01" id="jmlTap" required class="input-plain">
                    </div>
                    <div class="field-card !p-3">
                        <label class="label-text !text-[8px]">Sweep</label>
                        <input type="number" step="0.01" id="jmlSweeping" required class="input-plain">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 h-16 rounded-[22px] text-white font-black text-sm tracking-widest shadow-xl shadow-blue-200 active:scale-95 transition-all">
                    SIMPAN RINCIAN
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v8')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('sheet').classList.remove('translate-y-full'), 10);
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Data";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Tambah Rincian";
            }
        }

        function closeModal() {
            document.getElementById('sheet').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 300);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };
            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);
            localStorage.setItem('prod_v8', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach((item) => {
                const card = `
                    <div class="card-item">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white"><i data-lucide="package" class="w-6 h-6"></i></div>
                                <div>
                                    <h4 class="font-black text-slate-800 text-lg leading-none">${item.namaProduk}</h4>
                                    <p class="text-[10px] font-black text-slate-400 mt-2 uppercase tracking-widest">${item.lineBagging} • ${item.versi}</p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-3 mb-6">
                            <div class="bg-blue-50 rounded-2xl p-3 text-center border border-blue-100"><span class="block text-[8px] font-black text-blue-400 mb-1 uppercase">Karung</span><span class="text-lg font-black text-blue-600">${item.jmlKarung}</span></div>
                            <div class="bg-red-50 rounded-2xl p-3 text-center border border-red-100"><span class="block text-[8px] font-black text-red-400 mb-1 uppercase">Robek</span><span class="text-lg font-black text-red-500">${item.jmlRobek}</span></div>
                            <div class="bg-slate-50 rounded-2xl p-3 text-center border border-slate-100"><span class="block text-[8px] font-black text-slate-400 mb-1 uppercase">Batch</span><span class="text-lg font-black text-slate-800">${item.jmlBatch}</span></div>
                        </div>
                        <div class="flex justify-between items-center bg-slate-900 rounded-2xl p-4 text-white text-[10px] font-bold">
                            <div class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-400"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5 text-blue-400"></i> ${item.jamAwal}</div>
                            <div class="bg-white/10 px-2 py-1 rounded-lg">Label: ${item.labelDari}..</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v8', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Belum ada data.");
            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Sukses!");
                localData = [];
                localStorage.removeItem('prod_v8');
                render();
            } catch (e) { alert("Gagal!"); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> KIRIM DATA`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
