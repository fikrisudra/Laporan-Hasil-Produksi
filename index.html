<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laporan Hasil Produksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; color: #1e293b; padding-bottom: 120px; }
        
        /* HEADER */
        .navbar { position: sticky; top: 0; background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; z-index: 100; }
        .logo { font-weight: 800; font-size: 1rem; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* BUTTONS */
        .btn-send { background: #10b981; color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15); }
        .btn-send:active { transform: scale(0.95); }

        /* CARDS */
        .card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 2px 15px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .section-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        
        /* INPUTS */
        .field-box { margin-bottom: 15px; }
        .field { width: 100%; background: #f8fafc; border: 1.5px solid #f1f5f9; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; color: #334155; outline: none; transition: 0.2s; }
        .field:focus { border-color: #2563eb; background: white; }

        /* TABLE VIEW */
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 16px; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; background: white; }
        th { background: #f8fafc; padding: 12px; font-weight: 800; color: #64748b; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-weight: 600; color: #475569; white-space: nowrap; }
        .row-action { display: flex; gap: 8px; }

        /* LABEL SECTION (LUMBUT) */
        .label-area { background: #f1f5f9; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .label-area .field { background: white; border-color: #e2e8f0; color: #475569; }

        /* FIXED BOTTOM ACTION */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 20px 35px; background: linear-gradient(to top, white 80%, rgba(255,255,255,0)); z-index: 90; display: flex; justify-content: center; }
        .btn-add { width: 100%; max-width: 450px; height: 64px; background: #0f172a; color: white; border: none; border-radius: 20px; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: 0.3s; }
        .btn-add:active { transform: scale(0.96); background: #1e293b; }
        .icon-sq { background: #2563eb; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 200; }
        .modal-sheet { background: white; width: 100%; border-radius: 35px 35px 0 0; padding: 30px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-open .modal-sheet { transform: translateY(0); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1 class="logo">Laporan Hasil Produksi</h1>
        <button class="btn-send" onclick="sendToBackend()" id="btnKirim">
            <i data-lucide="upload-cloud" size="16"></i> SINKRON
        </button>
    </nav>

    <div class="container">
        <div class="card">
            <span class="section-title">Konfigurasi Sesi</span>
            <div class="field-box">
                <input type="date" id="globalTanggal" class="field">
            </div>
            <div class="grid-2">
                <select id="globalShift" class="field">
                    <option value="1">Shift 01</option>
                    <option value="2">Shift 02</option>
                    <option value="3">Shift 03</option>
                </select>
                <div style="display:flex; gap:5px">
                    <input type="time" id="globalJamAwal" class="field" style="font-size:11px; padding:10px 5px">
                    <input type="time" id="globalJamAkhir" class="field" style="font-size:11px; padding:10px 5px">
                </div>
            </div>
        </div>

        <div class="card">
            <span class="section-title">Rincian Item Produksi</span>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Produk</th>
                            <th>Karung</th>
                            <th>Line</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
            <div id="emptyState" style="text-align:center; padding:30px; opacity:0.3; font-size:11px; font-weight:700">
                TIDAK ADA DATA UNTUK DITAMPILKAN
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-add" onclick="openModal()">
            <div class="icon-sq"><i data-lucide="plus" size="20" color="white"></i></div>
            TAMBAH PRODUK
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
                <h2 style="font-weight:800; font-size:1.3rem">Tambah produk</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:#cbd5e1"><i data-lucide="x-circle" size="28"></i></button>
            </div>
            
            <form id="prodForm">
                <input type="hidden" id="editId">
                
                <div class="field-box">
                    <span class="section-title">Nama Item</span>
                    <input type="text" id="namaProduk" required placeholder="Masukkan Nama Produk" class="field">
                </div>
                
                <div class="grid-2 field-box">
                    <div>
                        <span class="section-title">Versi</span>
                        <input type="text" id="versi" required placeholder="v1.0" class="field">
                    </div>
                    <div>
                        <span class="section-title">Kavling</span>
                        <input type="text" id="kavlingTujuan" required placeholder="Kav A" class="field">
                    </div>
                </div>

                <div class="grid-2 field-box">
                    <div>
                        <span class="section-title">Line Bagging</span>
                        <input type="text" id="lineBagging" required placeholder="01" class="field">
                    </div>
                    <div>
                        <span class="section-title">Jam Produksi</span>
                        <div style="display:flex; gap:4px">
                            <input type="time" id="jamAwal" required class="field" style="font-size:11px; padding:10px 5px">
                            <input type="time" id="jamAkhir" required class="field" style="font-size:11px; padding:10px 5px">
                        </div>
                    </div>
                </div>

                <div class="label-area">
                    <span class="section-title" style="color:#64748b">Rentang Nomor Seri Label</span>
                    <div class="grid-2">
                        <input type="text" id="labelDari" placeholder="Seri Awal" required class="field">
                        <input type="text" id="labelSampai" placeholder="Seri Akhir" required class="field">
                    </div>
                </div>

                <div class="grid-3 field-box">
                    <div>
                        <span class="section-title" style="color:#2563eb">Karung</span>
                        <input type="number" id="jmlKarung" required class="field" style="background:#eff6ff; border-color:#dbeafe">
                    </div>
                    <div>
                        <span class="section-title" style="color:#ef4444">Robek</span>
                        <input type="number" id="jmlRobek" required class="field">
                    </div>
                    <div>
                        <span class="section-title">Batch</span>
                        <input type="number" id="jmlBatch" required class="field">
                    </div>
                </div>

                <button type="submit" style="width:100%; height:60px; background:#2563eb; color:white; border:none; border-radius:18px; font-weight:800; font-size:14px; margin-top:10px shadow: 0 10px 20px rgba(37,99,235,0.2)">SIMPAN KE DAFTAR</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let localData = JSON.parse(localStorage.getItem('prod_v12')) || [];

        function openModal(editId = null) {
            const modal = document.getElementById('modalOverlay');
            modal.style.display = 'flex';
            setTimeout(() => document.body.classList.add('modal-open'), 10);

            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
            }
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v12', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tableBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.style.display = 'block';
            else emptyState.style.display = 'none';

            localData.forEach((item) => {
                const row = `
                    <tr>
                        <td><div style="font-weight:800">${item.namaProduk}</div><div style="font-size:9px; color:#94a3b8">${item.versi}</div></td>
                        <td style="color:#2563eb">${item.jmlKarung}</td>
                        <td>Line ${item.lineBagging}</td>
                        <td>
                            <div class="row-action">
                                <button onclick="openModal(${item.id})" style="border:none; background:none; color:#2563eb"><i data-lucide="edit-3" size="16"></i></button>
                                <button onclick="removeItem(${item.id})" style="border:none; background:none; color:#ef4444"><i data-lucide="trash-2" size="16"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data rincian ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v12', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            if(!tgl) return alert("Pilih Tanggal Operasional!");
            if(localData.length === 0) return alert("Belum ada data untuk dikirim.");
            alert("Sinkronisasi dimulai...");
            // Logika POST fetch anda tetap sama
        }

        window.onload = render;
    </script>
</body>
</html>
