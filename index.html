<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProFlow Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfdfe;
            color: #0f172a;
            overflow-x: hidden;
        }

        /* --- ANIMATIONS --- */
        @keyframes slideInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .animate-list { animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        
        /* --- PROPER INPUTS --- */
        .input-elite {
            @apply w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all duration-300;
            @apply text-[15px] font-semibold text-slate-700 shadow-sm;
        }

        .input-elite:focus {
            @apply border-blue-500 bg-white ring-4 ring-blue-500/10 shadow-lg;
            transform: translateY(-1px);
        }

        /* --- BUTTON POLISHING --- */
        .btn-premium {
            @apply relative flex items-center justify-center gap-3 h-14 px-8 rounded-2xl font-extrabold text-sm tracking-wide transition-all duration-300 active:scale-95;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .btn-blue {
            @apply bg-blue-600 text-white shadow-blue-500/30;
        }
        .btn-blue:hover { @apply bg-blue-700 shadow-blue-500/40; }

        .btn-dark {
            @apply bg-slate-900 text-white shadow-slate-900/20;
        }

        .icon-circle {
            @apply flex items-center justify-center w-8 h-8 rounded-xl bg-white/20 backdrop-blur-sm;
        }

        /* --- POP UP ANIMATION --- */
        #modal.hidden { display: none; }
        #modal:not(.hidden) .modal-content {
            animation: modalSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalSlide {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="antialiased pb-36">

    <header class="bg-white/70 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-40 px-6 py-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i data-lucide="activity" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-black text-slate-900 tracking-tighter italic">ProFlow<span class="text-blue-600 font-black">.</span></h1>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] tracking-[0.1em] flex items-center gap-2 shadow-lg shadow-emerald-100 active:scale-90 transition-all uppercase">
                SINKRON <i data-lucide="upload-cloud" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 mt-8">
        <div class="bg-white p-7 rounded-[32px] border border-slate-100 shadow-[0_15px_40px_rgba(0,0,0,0.02)] mb-8 space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Tanggal Produksi</label>
                <input type="date" id="globalTanggal" class="input-elite">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="grid grid-cols-1">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Shift</label>
                    <select id="globalShift" class="input-elite">
                        <option value="1">Shift 01</option>
                        <option value="2">Shift 02</option>
                        <option value="3">Shift 03</option>
                    </select>
                </div>
                <div class="grid grid-cols-1">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Waktu</label>
                    <div class="flex gap-2">
                        <input type="time" id="globalJamAwal" class="input-elite !px-3">
                        <input type="time" id="globalJamAkhir" class="input-elite !px-3">
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-4"></div>

        <div id="emptyState" class="hidden text-center py-24 bg-slate-50/50 rounded-[40px] border border-dashed border-slate-200">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                <i data-lucide="plus" class="text-slate-300 w-8 h-8"></i>
            </div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Belum ada rincian data</p>
        </div>
    </main>

    <div class="fixed bottom-8 left-0 right-0 px-8 flex justify-center z-40">
        <button onclick="openModal()" class="w-full max-w-md btn-premium btn-dark">
            <div class="icon-circle text-blue-400">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </div>
            <span>TAMBAH PRODUKSI</span>
        </button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md transition-opacity" onclick="closeModal()"></div>
        
        <div class="modal-content bg-white w-full sm:max-w-lg rounded-t-[48px] sm:rounded-[40px] shadow-2xl z-50 overflow-hidden flex flex-col max-h-[96vh]">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mt-5 sm:hidden"></div>
            
            <div class="p-8 pt-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-8 sticky top-0 bg-white py-2 z-10">
                    <h2 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Rincian Baru</h2>
                    <button onclick="closeModal()" class="p-3 bg-slate-50 rounded-2xl text-slate-400 active:bg-red-50 active:text-red-500 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <form id="prodForm" class="space-y-6">
                    <input type="hidden" id="editId">
                    
                    <div class="space-y-4">
                        <input type="text" id="namaProduk" required placeholder="Nama Produk" class="input-elite">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="versi" required placeholder="Versi" class="input-elite">
                            <input type="text" id="kavlingTujuan" required placeholder="Kavling" class="input-elite">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="lineBagging" required placeholder="Line Bagging" class="input-elite">
                        <div class="flex gap-2">
                            <input type="time" id="jamAwal" required class="input-elite !px-2">
                            <input type="time" id="jamAkhir" required class="input-elite !px-2">
                        </div>
                    </div>

                    <div class="p-6 bg-blue-50/50 rounded-[30px] border border-blue-100/50">
                        <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-4 text-center">Nomor Seri Label</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="labelDari" placeholder="Dari" required class="input-elite !bg-white">
                            <input type="text" id="labelSampai" placeholder="Sampai" required class="input-elite !bg-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="jmlBatch" required placeholder="Jumlah Batch" class="input-elite">
                        <input type="number" id="jmlKarung" required placeholder="Total Karung" class="input-elite border-blue-200 !text-blue-600">
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" id="jmlRobek" required placeholder="Robek" class="input-elite border-red-100 !h-12 !text-red-500">
                        <input type="number" step="0.01" id="jmlTap" required placeholder="Tap" class="input-elite !h-12">
                        <input type="number" step="0.01" id="jmlSweeping" required placeholder="Sweep" class="input-elite !h-12">
                    </div>

                    <button type="submit" class="w-full btn-premium btn-blue mt-4 shadow-xl">
                        <div class="icon-circle"><i data-lucide="check" class="w-5 h-5"></i></div>
                        <span>SIMPAN RINCIAN</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_elite_v4')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Data";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Rincian Baru";
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_elite_v4', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach((item, index) => {
                const card = `
                    <div class="animate-list bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm relative group active:scale-[0.98] transition-all" style="animation-delay: ${index * 0.1}s">
                        <div class="flex justify-between items-start mb-5">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                                    <i data-lucide="package" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-lg tracking-tight">${item.namaProduk}</h4>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${item.lineBagging} • ${item.versi}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openModal(${item.id})" class="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:text-blue-600 transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 mb-5">
                            <div class="bg-blue-50/50 rounded-2xl p-3 text-center border border-blue-50">
                                <span class="block text-[8px] font-black text-blue-400 uppercase mb-1">Karung</span>
                                <span class="text-base font-black text-blue-600">${item.jmlKarung}</span>
                            </div>
                            <div class="bg-red-50/50 rounded-2xl p-3 text-center border border-red-50">
                                <span class="block text-[8px] font-black text-red-400 uppercase mb-1">Robek</span>
                                <span class="text-base font-black text-red-500">${item.jmlRobek}</span>
                            </div>
                            <div class="bg-slate-50 rounded-2xl p-3 text-center border border-slate-100">
                                <span class="block text-[8px] font-black text-slate-400 uppercase mb-1">Batch</span>
                                <span class="text-base font-black text-slate-800">${item.jmlBatch}</span>
                            </div>
                        </div>

                        <div class="flex justify-between items-center bg-slate-900 rounded-2xl p-4 text-white">
                            <div class="flex items-center gap-1.5 text-[10px] font-bold"><i data-lucide="map-pin" class="w-4 h-4 text-blue-400"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1.5 text-[10px] font-bold"><i data-lucide="clock" class="w-4 h-4 text-blue-400"></i> ${item.jamAwal}</div>
                            <div class="bg-white/10 px-3 py-1 rounded-lg text-[9px] font-mono tracking-tighter">${item.labelDari}..</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_elite_v4', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Belum ada data.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Sinkron Berhasil!");
                localData = [];
                localStorage.removeItem('prod_elite_v4');
                render();
            } catch (e) { alert("Gagal."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `SINKRON <i data-lucide="upload-cloud" class="w-4 h-4"></i>`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
