<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laporan Hasil Produksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; color: #1e293b; padding-bottom: 110px; }
        
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; z-index: 100; }
        .logo { font-weight: 800; font-size: 0.9rem; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-send-icon { 
            width: 40px; height: 40px; background: #f0fdf4; color: #16a34a; border: none; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.2s; border: 1px solid #dcfce7;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        .card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.01); margin-bottom: 15px; }
        .section-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        /* HEADER JAM STYLE */
        .time-display { font-family: 'Monaco', 'Consolas', monospace; font-size: 13px; font-weight: 700; color: #475569; letter-spacing: 0.5px; }

        .field { width: 100%; background: #f8fafc; border: 1.5px solid #f1f5f9; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 700; color: #334155; outline: none; }

        /* TABLE */
        .table-container { width: 100%; border-radius: 18px; border: 1px solid #f1f5f9; overflow: visible; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        th { background: #f8fafc; padding: 12px; font-weight: 800; color: #64748b; border-bottom: 1px solid #f1f5f9; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-weight: 600; color: #475569; position: relative; }

        /* DROPDOWN MENU */
        .dropdown { position: relative; display: inline-block; }
        .btn-dots { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; cursor: pointer; color: #64748b; display: flex; align-items: center; }
        .dropdown-content { 
            display: none; position: absolute; right: 0; top: 40px; background: white; 
            min-width: 120px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 14px; 
            z-index: 150; border: 1px solid #f1f5f9; overflow: hidden;
        }
        .dropdown-content button { 
            width: 100%; padding: 12px 15px; border: none; background: none; 
            text-align: left; font-size: 11px; font-weight: 700; color: #475569; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .dropdown-content button:hover { background: #f8fafc; color: #2563eb; }
        .show { display: block; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, white 70%, transparent); z-index: 90; display: flex; justify-content: center; }
        .btn-add-soft { width: 100%; max-width: 380px; height: 56px; background: #1e293b; color: white; border: none; border-radius: 28px; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(30, 41, 59, 0.15); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 200; }
        .modal-sheet { background: white; width: 100%; border-radius: 32px 32px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: 0.3s ease-out; }
        .modal-open .modal-sheet { transform: translateY(0); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .label-area { background: #f9fafb; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1 class="logo">Laporan Produksi</h1>
        <button class="btn-send-icon" onclick="sendToBackend()" id="btnKirim"><i data-lucide="cloud-upload" size="20"></i></button>
    </nav>

    <div class="container">
        <div class="card">
            <span class="section-title">Konfigurasi Sesi</span>
            <div style="margin-bottom:10px"><input type="date" id="globalTanggal" class="field"></div>
            <div class="grid-2">
                <select id="globalShift" class="field">
                    <option value="1">Shift 01</option>
                    <option value="2">Shift 02</option>
                    <option value="3">Shift 03</option>
                </select>
                <div style="display:flex; align-items:center; justify-content:space-around; background:#f1f5f9; border-radius:14px; padding:0 10px;">
                    <span class="time-display" id="displayAwal">00:00</span>
                    <span style="color:#cbd5e1">—</span>
                    <span class="time-display" id="displayAkhir">00:00</span>
                </div>
            </div>
        </div>

        <div class="card" style="padding:15px">
            <span class="section-title">Daftar Item</span>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Produk</th>
                            <th>Karung</th>
                            <th>Line</th>
                            <th style="text-align:right">Menu</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="emptyState" style="text-align:center; padding:30px; opacity:0.3; font-size:10px; font-weight:800">BELUM ADA DATA</div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-add-soft" onclick="openModal()"><i data-lucide="plus" size="20"></i> TAMBAH PRODUK</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 id="modalHeaderTitle" style="font-weight:800; font-size:1.1rem">Tambah produk</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:#cbd5e1"><i data-lucide="x-circle" size="26"></i></button>
            </div>
            
            <form id="prodForm">
                <input type="hidden" id="editId">
                <div class="grid-2" style="margin-bottom:10px">
                    <div><span class="section-title">Nama Produk</span><input type="text" id="namaProduk" required class="field"></div>
                    <div><span class="section-title">Line</span><input type="text" id="lineBagging" required class="field"></div>
                </div>

                <div class="grid-2" style="margin-bottom:10px">
                    <div><span class="section-title">Jam Mulai</span><input type="time" id="jamAwal" required class="field" oninput="updateHeaderTime()"></div>
                    <div><span class="section-title">Jam Akhir</span><input type="time" id="jamAkhir" required class="field" oninput="updateHeaderTime()"></div>
                </div>

                <div class="grid-2" style="margin-bottom:10px">
                    <div><span class="section-title">Versi</span><input type="text" id="versi" required class="field"></div>
                    <div><span class="section-title">Kavling</span><input type="text" id="kavlingTujuan" required class="field"></div>
                </div>

                <div class="label-area">
                    <span class="section-title">Seri Label</span>
                    <div class="grid-2">
                        <input type="text" id="labelDari" placeholder="Mulai" required class="field">
                        <input type="text" id="labelSampai" placeholder="Selesai" required class="field">
                    </div>
                </div>

                <div class="grid-3" style="margin-bottom:15px">
                    <div><span class="section-title" style="color:#2563eb">Karung</span><input type="number" id="jmlKarung" required class="field" style="background:#eff6ff"></div>
                    <div><span class="section-title">Tap (Kg)</span><input type="number" step="0.01" id="jmlTap" required class="field"></div>
                    <div><span class="section-title">Sweep (Kg)</span><input type="number" step="0.01" id="jmlSweeping" required class="field"></div>
                </div>

                <div class="grid-2" style="margin-bottom:20px">
                    <div><span class="section-title" style="color:#ef4444">Robek</span><input type="number" id="jmlRobek" required class="field"></div>
                    <div><span class="section-title">Batch</span><input type="number" id="jmlBatch" required class="field"></div>
                </div>

                <button type="submit" id="btnSimpan" style="width:100%; height:55px; background:#2563eb; color:white; border:none; border-radius:18px; font-weight:800; cursor:pointer">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let localData = JSON.parse(localStorage.getItem('prod_v15')) || [];

        function updateHeaderTime() {
            document.getElementById('displayAwal').innerText = document.getElementById('jamAwal').value || "00:00";
            document.getElementById('displayAkhir').innerText = document.getElementById('jamAkhir').value || "00:00";
        }

        function toggleDropdown(id) {
            document.querySelectorAll('.dropdown-content').forEach(d => {
                if(d.id !== 'dd-'+id) d.classList.remove('show');
            });
            document.getElementById('dd-' + id).classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            }
        }

        function openModal(editId = null, isView = false) {
            const modal = document.getElementById('modalOverlay');
            const btnSimpan = document.getElementById('btnSimpan');
            const title = document.getElementById('modalHeaderTitle');
            modal.style.display = 'flex';
            setTimeout(() => document.body.classList.add('modal-open'), 10);
            btnSimpan.style.display = isView ? 'none' : 'block';
            title.innerText = isView ? "Detail Produk" : (editId ? "Edit Produk" : "Tambah produk");

            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                updateHeaderTime();
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                updateHeaderTime();
            }
        }

        function closeModal() {
            document.body.classList.remove('modal-open');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };
            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);
            localStorage.setItem('prod_v15', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tableBody.innerHTML = '';
            if(localData.length === 0) emptyState.style.display = 'block';
            else emptyState.style.display = 'none';

            localData.forEach((item) => {
                const row = `
                    <tr>
                        <td><div style="font-weight:800">${item.namaProduk}</div><div style="font-size:8px; color:#94a3b8">${item.jamAwal}-${item.jamAkhir}</div></td>
                        <td style="color:#2563eb; font-weight:800">${item.jmlKarung}</td>
                        <td>${item.lineBagging}</td>
                        <td style="text-align:right">
                            <div class="dropdown">
                                <button class="btn-dots" onclick="toggleDropdown(${item.id})"><i data-lucide="more-vertical" size="16"></i></button>
                                <div id="dd-${item.id}" class="dropdown-content">
                                    <button onclick="openModal(${item.id}, true)"><i data-lucide="eye" size="14"></i> View</button>
                                    <button onclick="openModal(${item.id})"><i data-lucide="edit-2" size="14"></i> Edit</button>
                                    <button style="color:#ef4444" onclick="removeItem(${item.id})"><i data-lucide="trash" size="14"></i> Hapus</button>
                                </div>
                            </div>
                        </td>
                    </tr>`;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v15', JSON.stringify(localData));
                render();
            }
        }

        function sendToBackend() {
            if(!document.getElementById('globalTanggal').value) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Data kosong!");
            alert("Sinkronisasi dimulai...");
        }

        window.onload = render;
    </script>
</body>
</html>
