<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Produksi Pro Full Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden; /* Mencegah geser kanan-kiri pada body */
        }
        
        /* Memastikan input tidak zoom saat di-klik di iOS */
        input, select, textarea { font-size: 16px !important; }

        /* Custom Scrollbar untuk Modal agar tetap rapi */
        .modal-content::-webkit-scrollbar { width: 4px; }
        .modal-content::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="antialiased text-slate-900 pb-28">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tight text-slate-800">
                Laporan<span class="text-blue-600">Produksi</span>
            </h1>
            <button onclick="sendToBackend()" id="btnKirim" class="bg-green-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-md active:scale-95 transition-all flex items-center gap-2">
                <i data-lucide="send" class="w-4 h-4"></i> Kirim
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pt-6">
        <div class="bg-white rounded-3xl p-5 border border-slate-200 shadow-sm mb-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Tanggal</label>
                    <input type="date" id="globalTanggal" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition-all">
                </div>
                <div class="col-span-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Shift</label>
                    <select id="globalShift" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="col-span-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Jam Kerja</label>
                    <div class="flex items-center gap-1">
                        <input type="time" id="globalJamAwal" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                        <span class="text-slate-300">-</span>
                        <input type="time" id="globalJamAkhir" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-4">
            </div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="clipboard-x" class="text-slate-300 w-8 h-8"></i>
            </div>
            <p class="text-slate-400 font-medium">Belum ada rincian produksi.</p>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 px-6 flex justify-center z-40">
        <button onclick="openModal()" class="w-full max-w-md bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <i data-lucide="plus-circle" class="w-6 h-6 text-blue-400"></i>
            <span>Tambah Rincian Produk</span>
        </button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div class="modal-content bg-white w-full sm:max-w-lg rounded-t-[32px] sm:rounded-[32px] shadow-2xl z-50 overflow-y-auto max-h-[92vh] flex flex-col">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mt-3 mb-1 sm:hidden"></div>
            
            <div class="p-6 pt-2">
                <div class="flex justify-between items-center mb-6 sticky top-0 bg-white py-2 z-10 border-b border-slate-50">
                    <h2 id="modalTitle" class="text-lg font-bold">Input Rincian</h2>
                    <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <form id="prodForm" class="space-y-5 pb-8">
                    <input type="hidden" id="editId">
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Nama Produk</label>
                            <input type="text" id="namaProduk" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Versi</label>
                                <input type="text" id="versi" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Kavling</label>
                                <input type="text" id="kavlingTujuan" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Line Bagging</label>
                                <input type="text" id="lineBagging" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Jam Operasional</label>
                                <div class="flex items-center gap-1">
                                    <input type="time" id="jamAwal" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                                    <input type="time" id="jamAkhir" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                                </div>
                            </div>
                        </div>

                        <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                            <label class="block text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-3 text-center underline">Rentang Nomor Label</label>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="labelDari" placeholder="Dari" required class="w-full p-3 bg-white border border-blue-200 rounded-xl outline-none">
                                <input type="text" id="labelSampai" placeholder="Sampai" required class="w-full p-3 bg-white border border-blue-200 rounded-xl outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Jml Batch</label>
                                <input type="number" id="jmlBatch" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1 ml-1">Jml Karung</label>
                                <input type="number" id="jmlKarung" required class="w-full p-3 border-2 border-blue-100 rounded-xl outline-none focus:border-blue-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="block text-[9px] font-bold text-red-500 uppercase tracking-tighter mb-1 ml-1">Robek</label>
                                <input type="number" id="jmlRobek" required class="w-full p-2 border border-red-100 rounded-lg outline-none">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-tighter mb-1 ml-1">Tap (Kg)</label>
                                <input type="number" step="0.01" id="jmlTap" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-tighter mb-1 ml-1">Sweep (Kg)</label>
                                <input type="number" step="0.01" id="jmlSweeping" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> Simpan Data
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v_responsive')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Edit Data";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Input Rincian";
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v_responsive', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach(item => {
                const card = `
                    <div class="bg-white rounded-[24px] p-5 border border-slate-200 shadow-sm relative overflow-hidden">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-slate-800 text-base">${item.namaProduk}</h4>
                                <div class="flex gap-2 mt-1">
                                    <span class="text-[9px] font-bold px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md uppercase">${item.versi}</span>
                                    <span class="text-[9px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-md uppercase">${item.lineBagging}</span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-2 text-slate-400 hover:text-blue-600 active:bg-blue-50 rounded-xl transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2 text-slate-400 hover:text-red-500 active:bg-red-50 rounded-xl transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 bg-slate-50 rounded-2xl p-3 border border-slate-100">
                            <div class="text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Karung</p>
                                <p class="text-sm font-bold text-blue-600">${item.jmlKarung}</p>
                            </div>
                            <div class="text-center border-x border-slate-200">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Robek</p>
                                <p class="text-sm font-bold text-red-500">${item.jmlRobek}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Batch</p>
                                <p class="text-sm font-bold text-slate-700">${item.jmlBatch}</p>
                            </div>
                        </div>

                        <div class="mt-4 flex justify-between items-center text-[10px] font-semibold text-slate-500">
                            <div class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3 text-blue-400"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${item.jamAwal}-${item.jamAkhir}</div>
                            <div class="bg-slate-900 text-white px-2 py-1 rounded-md text-[8px]">${item.labelDari} - ${item.labelSampai}</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus baris ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v_responsive', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Data kosong.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Data Terkirim!");
                localData = [];
                localStorage.removeItem('prod_v_responsive');
                render();
            } catch (e) { alert("Gagal Kirim."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> Kirim`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
