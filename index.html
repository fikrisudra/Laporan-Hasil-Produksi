<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Produksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto glass-card p-8">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Input Hasil Produksi</h2>
        
        <form id="prodForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Produk</label>
                <input type="text" id="produk" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Jumlah (Qty)</label>
                <input type="number" id="jumlah" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Status</label>
                <select id="status" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <option value="Selesai">Selesai</option>
                    <option value="Pending">Pending</option>
                    <option value="Reject">Reject</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                Kirim Laporan
            </button>
        </form>
        <p id="responseMsg" class="mt-4 text-center text-sm font-semibold"></p>
    </div>

    <script>
        const scriptURL = 'URL_GOOGLE_APPS_SCRIPT_ANDA_DISINI'; // Ganti dengan URL dari langkah sebelumnya
        const form = document.getElementById('prodForm');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Mengirim...';

            const data = {
                produk: document.getElementById('produk').value,
                jumlah: document.getElementById('jumlah').value,
                status: document.getElementById('status').value
            };

            fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify(data)
            })
            .then(response => {
                msg.innerText = "Data berhasil disimpan!";
                msg.classList.add("text-green-600");
                form.reset();
            })
            .catch(error => {
                msg.innerText = "Gagal mengirim data.";
                msg.classList.add("text-red-600");
                console.error('Error!', error.message);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Kirim Laporan';
            });
        });
    </script>
</body>
</html>
