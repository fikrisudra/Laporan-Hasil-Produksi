<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Produksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        table { border-spacing: 0; width: 100%; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        tr:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="glass-card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Input Hasil Produksi</h2>
            <form id="prodForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Produk</label>
                    <input type="text" id="produk" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Jumlah (Qty)</label>
                    <input type="number" id="jumlah" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Status</label>
                    <select id="status" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        <option value="Selesai">Selesai</option>
                        <option value="Pending">Pending</option>
                        <option value="Reject">Reject</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition font-semibold">
                    Kirim Laporan
                </button>
            </form>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-4 border-b bg-white flex justify-between items-center">
                <h3 class="font-bold text-gray-700">Riwayat Produksi (Database Sheet)</h3>
                <button onclick="loadData()" class="text-sm text-blue-600 hover:underline">Refresh Data</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 border-b text-left">Waktu</th>
                            <th class="px-6 py-3 border-b text-left">Produk</th>
                            <th class="px-6 py-3 border-b text-left">Qty</th>
                            <th class="px-6 py-3 border-b text-left">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-200 text-sm text-gray-600">
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-center text-gray-400">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'URL_WEB_APP_GOOGLE_SCRIPT_ANDA';

        // Fungsi Kirim Data
        const form = document.getElementById('prodForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Mengirim...';

            const data = {
                produk: document.getElementById('produk').value,
                jumlah: document.getElementById('jumlah').value,
                status: document.getElementById('status').value
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
            .then(() => {
                alert("Data Berhasil Terkirim!");
                form.reset();
                loadData(); // Update tabel setelah kirim
            })
            .catch(error => console.error('Error!', error.message))
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Kirim Laporan';
            });
        });

        // Fungsi Ambil Data dari Google Sheet (Untuk Tabel)
        function loadData() {
            const tableBody = document.getElementById('tableBody');
            
            // Catatan: Anda perlu menambahkan fungsi doGet(e) di Apps Script untuk menarik data
            fetch(scriptURL + "?action=read")
            .then(res => res.json())
            .then(data => {
                tableBody.innerHTML = "";
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">${row.timestamp}</td>
                        <td class="px-6 py-4 font-medium text-gray-900">${row.produk}</td>
                        <td class="px-6 py-4">${row.jumlah}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${getStatusClass(row.status)}">
                                ${row.status}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(() => {
                tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-red-400">Gagal memuat data. Pastikan doGet dikonfigurasi.</td></tr>';
            });
        }

        function getStatusClass(status) {
            if (status === 'Selesai') return 'bg-green-100 text-green-700';
            if (status === 'Pending') return 'bg-yellow-100 text-yellow-700';
            return 'bg-red-100 text-red-700';
        }

        // Jalankan saat pertama kali buka halaman
        window.onload = loadData;
    </script>
</body>
</html>
