<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laporan Produksi v34.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
            padding-bottom: 80px;
        }

        /* Glassmorphism Navbar */
        .navbar { 
            position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #e2e8f0; z-index: 1000; 
        }
        .logo { font-weight: 800; font-size: 0.85rem; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .btn-sync { 
            background: #10b981; color: white; border: none; 
            width: 38px; height: 38px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); 
        }

        .container { max-width: 500px; margin: 0 auto; padding: 12px; }
        
        /* Card Style */
        .card { 
            background: white; border-radius: 20px; padding: 18px; 
            border: 1px solid #f1f5f9; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 15px; 
        }
        
        .section-title { 
            font-size: 10px; font-weight: 800; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; 
        }
        
        /* Input Fields - Optimized for Mobile */
        .field { 
            width: 100%; background: #f8fafc; border: 1.5px solid #f1f5f9; 
            border-radius: 12px; padding: 12px; font-size: 14px; 
            font-weight: 600; color: #334155; outline: none; transition: 0.2s;
        }
        .field:focus { border-color: #3b82f6; background: white; }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .field-with-icon { padding-left: 40px; }

        /* Table Style */
        .table-container { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f8fafc; padding: 12px; font-weight: 700; color: #64748b; text-align: left; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; }

        /* Modals */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; align-items: flex-end; z-index: 2000; 
        }
        .modal-sheet { 
            background: white; width: 100%; border-radius: 25px 25px 0 0; 
            padding: 20px; max-height: 90vh; overflow-y: auto;
        }

        /* Action Menu */
        .action-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            display: none; align-items: center; justify-content: center; z-index: 3000; 
        }
        .action-menu { 
            background: white; width: 280px; border-radius: 20px; padding: 10px; 
            display: flex; flex-direction: column; gap: 5px;
        }
        .action-btn { 
            width: 100%; padding: 14px; border: none; background: none; 
            display: flex; align-items: center; gap: 12px; 
            font-size: 14px; font-weight: 600; border-radius: 12px;
        }
        .action-btn:active { background: #f1f5f9; }
        .btn-del { color: #ef4444; }

        /* Floating Action Button */
        .btn-fab { 
            position: fixed; bottom: 25px; right: 20px; 
            width: 60px; height: 60px; background: #3b82f6; 
            color: white; border: none; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); z-index: 999;
        }

        #toast { 
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); 
            background: #1e293b; color: white; padding: 10px 20px; 
            border-radius: 12px; font-size: 13px; display: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Laporan Produksi</div>
        <button class="btn-sync" onclick="alert('Sinkronisasi...')">
            <i data-lucide="upload-cloud" size="20"></i>
        </button>
    </nav>

    <div class="container">
        <!-- Info Utama -->
        <div class="card">
            <span class="section-title">Konfigurasi Shift</span>
            <div class="input-group">
                <i data-lucide="calendar" class="input-icon" size="16"></i>
                <input type="date" id="globalTanggal" class="field field-with-icon">
            </div>
            <select id="globalShift" class="field">
                <option value="1">Shift 1 (08:00 - 16:00)</option>
                <option value="2">Shift 2 (16:00 - 00:00)</option>
                <option value="3">Shift 3 (00:00 - 08:00)</option>
            </select>
        </div>

        <!-- Tabel Ringkasan -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                <span class="section-title" style="margin:0">Hasil Produksi</span>
                <button onclick="openFullTable()" style="border:none; background:none; color:#3b82f6;">
                    <i data-lucide="expand" size="18"></i>
                </button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Produk</th><th>Line</th><th>Karung</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Tombol Tambah -->
    <button class="btn-fab" onclick="openModal()">
        <i data-lucide="plus" size="28"></i>
    </button>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <h3 id="modalTitle">Tambah Data</h3>
                <button onclick="closeModal('modalOverlay')" style="border:none; background:none;"><i data-lucide="x"></i></button>
            </div>
            <form id="prodForm">
                <input type="hidden" id="editId">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <input type="text" id="namaProduk" placeholder="Nama Produk" class="field" required>
                    <input type="text" id="versi" placeholder="Versi" class="field" required>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="lineBagging" class="field">
                        <option value="Line 1">Line 1</option>
                        <option value="Line 2">Line 2</option>
                    </select>
                    <input type="number" id="jmlKarung" placeholder="Jml Karung" class="field" required>
                </div>
                <button type="submit" style="width:100%; padding:15px; background:#3b82f6; color:white; border:none; border-radius:12px; font-weight:700; margin-top:10px">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <!-- Modal Full Table -->
    <div class="modal-overlay" id="fullTableOverlay">
        <div class="modal-sheet" style="max-height: 95vh;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <h3>Detail Lengkap</h3>
                <button onclick="closeModal('fullTableOverlay')" style="border:none; background:none;"><i data-lucide="x"></i></button>
            </div>
            <div style="overflow-x: auto;">
                <table style="min-width: 500px;">
                    <thead>
                        <tr><th>Produk</th><th>Versi</th><th>Line</th><th>Karung</th></tr>
                    </thead>
                    <tbody id="fullTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Action Menu -->
    <div class="action-overlay" id="actionOverlay" onclick="this.style.display='none'">
        <div class="action-menu" onclick="event.stopPropagation()">
            <button class="action-btn" onclick="handleEdit()"><i data-lucide="edit-2" size="18"></i> Edit Data</button>
            <button class="action-btn btn-del" onclick="handleDelete()"><i data-lucide="trash-2" size="18"></i> Hapus Data</button>
        </div>
    </div>

    <div id="toast">Berhasil diperbarui</div>

    <script>
        let localData = JSON.parse(localStorage.getItem('prod_data')) || [];
        let selectedId = null;

        function initApp() {
            lucide.createIcons();
            renderTable();
        }

        function renderTable() {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = localData.map(item => `
                <tr onclick="showActions(${item.id})">
                    <td style="font-weight:700">${item.namaProduk}</td>
                    <td>${item.lineBagging}</td>
                    <td style="color:#3b82f6; font-weight:800">${item.jmlKarung}</td>
                </tr>
            `).join('') || '<tr><td colspan="3" style="text-align:center; color:#94a3b8">Kosong</td></tr>';
            lucide.createIcons();
        }

        function openModal(id = null) {
            document.getElementById('modalOverlay').style.display = 'flex';
            const form = document.getElementById('prodForm');
            form.reset();
            if(id) {
                const data = localData.find(x => x.id === id);
                document.getElementById('editId').value = data.id;
                document.getElementById('namaProduk').value = data.namaProduk;
                document.getElementById('versi').value = data.versi;
                document.getElementById('lineBagging').value = data.lineBagging;
                document.getElementById('jmlKarung').value = data.jmlKarung;
                document.getElementById('modalTitle').innerText = "Edit Data";
            } else {
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Tambah Data";
            }
            lucide.createIcons();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function showActions(id) {
            selectedId = id;
            document.getElementById('actionOverlay').style.display = 'flex';
            lucide.createIcons();
        }

        function handleEdit() {
            document.getElementById('actionOverlay').style.display = 'none';
            openModal(selectedId);
        }

        function handleDelete() {
            if(confirm('Hapus data ini?')) {
                localData = localData.filter(x => x.id !== selectedId);
                saveData();
                document.getElementById('actionOverlay').style.display = 'none';
            }
        }

        function openFullTable() {
            document.getElementById('fullTableOverlay').style.display = 'flex';
            const ftb = document.getElementById('fullTableBody');
            ftb.innerHTML = localData.map(item => `
                <tr>
                    <td>${item.namaProduk}</td>
                    <td>${item.versi}</td>
                    <td>${item.lineBagging}</td>
                    <td>${item.jmlKarung}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('prodForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const entry = {
                id: id ? parseInt(id) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                jmlKarung: document.getElementById('jmlKarung').value
            };

            if(id) {
                const idx = localData.findIndex(x => x.id === parseInt(id));
                localData[idx] = entry;
            } else {
                localData.push(entry);
            }

            saveData();
            closeModal('modalOverlay');
        };

        function saveData() {
            localStorage.setItem('prod_data', JSON.stringify(localData));
            renderTable();
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
