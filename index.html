<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produksi App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass-modal { backdrop-filter: blur(8px); background: rgba(255,255,255,0.9); }
        .fab { position: fixed; bottom: 2rem; right: 2rem; z-index: 40; }
    </style>
</head>
<body class="antialiased text-gray-900">

    <header class="bg-white border-b sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-blue-600">Laporan<span class="text-gray-800">Produksi</span></h1>
            
            <div class="flex gap-2">
                <button onclick="sendToBackend()" id="btnKirim" class="p-2.5 bg-green-500 text-white rounded-full hover:bg-green-600 shadow-md transition-all active:scale-95" title="Kirim ke Backend">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 pb-24">
        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="clipboard-list" class="w-16 h-16 mx-auto text-gray-300 mb-4"></i>
            <p class="text-gray-500 font-medium">Belum ada data lokal.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Produk</th>
                            <th class="px-4 py-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Qty</th>
                            <th class="px-4 py-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-4 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider"></th>
                        </tr>
                    </thead>
                    <tbody id="localTableBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <button onclick="toggleModal()" class="fab p-4 bg-blue-600 text-white rounded-full shadow-2xl hover:bg-blue-700 transition-transform active:scale-90 flex items-center justify-center">
        <i data-lucide="plus" class="w-8 h-8"></i>
    </button>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm modal-overlay" onclick="toggleModal()"></div>
        
        <div class="glass-modal w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl shadow-2xl z-50 transform transition-all overflow-hidden p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Tambah Laporan</h2>
                <button onclick="toggleModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="prodForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Produk</label>
                    <input type="text" id="produk" required placeholder="Contoh: Screen Protector" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Jumlah</label>
                        <input type="number" id="jumlah" required placeholder="0" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Status</label>
                        <select id="status" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all appearance-none">
                            <option value="Selesai">Selesai</option>
                            <option value="Pending">Pending</option>
                            <option value="Reject">Reject</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Simpan Lokal
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const scriptURL = 'URL_APPS_SCRIPT_ANDA'; 
        let localData = JSON.parse(localStorage.getItem('prod_v1')) || [];

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden');
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                produk: document.getElementById('produk').value,
                jumlah: document.getElementById('jumlah').value,
                status: document.getElementById('status').value
            };
            localData.push(newItem);
            localStorage.setItem('prod_v1', JSON.stringify(localData));
            this.reset();
            toggleModal();
            render();
        });

        function render() {
            const tbody = document.getElementById('localTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';
            
            if(localData.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            localData.forEach(item => {
                const color = item.status === 'Selesai' ? 'text-green-600 bg-green-50' : 
                              item.status === 'Pending' ? 'text-yellow-600 bg-yellow-50' : 'text-red-600 bg-red-50';
                
                const row = `
                    <tr class="group">
                        <td class="px-4 py-4">
                            <div class="font-semibold text-gray-800 text-sm">${item.produk}</div>
                        </td>
                        <td class="px-4 py-4 text-center text-sm text-gray-600">${item.jumlah}</td>
                        <td class="px-4 py-4 text-center">
                            <span class="inline-block px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase ${color}">
                                ${item.status}
                            </span>
                        </td>
                        <td class="px-4 py-4 text-right">
                            <button onclick="removeItem(${item.id})" class="p-1.5 text-gray-400 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            localData = localData.filter(i => i.id !== id);
            localStorage.setItem('prod_v1', JSON.stringify(localData));
            render();
        }

        async function sendToBackend() {
            if (localData.length === 0) return;
            const btn = document.getElementById('btnKirim');
            btn.classList.add('animate-pulse', 'opacity-50');
            
            try {
                for (const item of localData) {
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(item) });
                }
                localData = [];
                localStorage.removeItem('prod_v1');
                render();
                alert("Berhasil disinkronisasi!");
            } catch (e) {
                alert("Koneksi gagal!");
            } finally {
                btn.classList.remove('animate-pulse', 'opacity-50');
            }
        }

        window.onload = render;
    </script>
</body>
</html>
