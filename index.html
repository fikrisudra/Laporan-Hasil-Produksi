<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProFlow Premium v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-main: #fcfdfe;
            --input-bg: #f1f5f9;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main);
            color: #0f172a;
            letter-spacing: -0.01em;
        }

        /* Input Box Modern & Proper */
        .input-field {
            @apply w-full h-13 px-4 bg-slate-100/50 border border-slate-200/60 rounded-[18px] outline-none transition-all duration-300 text-[15px] font-semibold text-slate-700 shadow-inner;
        }

        .input-field:focus {
            @apply border-blue-500 bg-white ring-[5px] ring-blue-500/10 shadow-lg;
        }

        /* Label Styling */
        .field-label {
            @apply block text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.12em] mb-1.5 ml-1;
        }

        /* Container & Cards */
        .glass-card {
            @apply bg-white border border-slate-200/50 rounded-[32px] p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] backdrop-blur-sm;
        }

        /* Group Container */
        .inner-group {
            @apply p-5 bg-slate-50/50 border border-slate-100 rounded-[24px] transition-all duration-300;
        }
        
        .inner-group:focus-within {
            @apply bg-blue-50/30 border-blue-100;
        }

        /* Button Polishing */
        .btn-primary {
            @apply bg-slate-900 text-white h-14 rounded-[20px] font-bold shadow-xl shadow-slate-200 active:scale-95 transition-all flex items-center justify-center gap-3;
        }

        /* Custom Scroll & Time */
        input[type="time"] { @apply font-mono font-medium; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="antialiased pb-36">

    <header class="bg-white/80 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-40 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-200">
                    <i data-lucide="layers" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter italic">ProFlow<span class="text-blue-600 font-black">.</span></h1>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="bg-blue-600 text-white px-5 py-2.5 rounded-[14px] font-bold text-[11px] shadow-lg shadow-blue-100 active:scale-95 transition-all flex items-center gap-2 tracking-widest">
                SINKRON DATA <i data-lucide="refresh-cw" class="w-3 h-3"></i>
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 mt-8">
        <div class="glass-card mb-8">
            <div class="flex items-center gap-2 mb-6 border-b border-slate-50 pb-4">
                <i data-lucide="calendar" class="w-4 h-4 text-blue-500"></i>
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Metadata Laporan</span>
            </div>
            <div class="space-y-6">
                <div class="grid grid-cols-1 gap-1">
                    <label class="field-label">Tanggal Produksi</label>
                    <input type="date" id="globalTanggal" class="input-field">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="grid grid-cols-1">
                        <label class="field-label">Shift Kerja</label>
                        <select id="globalShift" class="input-field">
                            <option value="1">Shift 01</option>
                            <option value="2">Shift 02</option>
                            <option value="3">Shift 03</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1">
                        <label class="field-label">Durasi Operasi</label>
                        <div class="flex items-center gap-2">
                            <input type="time" id="globalJamAwal" class="input-field px-2">
                            <input type="time" id="globalJamAkhir" class="input-field px-2">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="space-y-4"></div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="w-16 h-16 bg-white border border-slate-100 rounded-[20px] flex items-center justify-center mx-auto mb-4 shadow-sm">
                <i data-lucide="clipboard" class="text-slate-200 w-6 h-6"></i>
            </div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em]">Data rincian masih kosong</p>
        </div>
    </main>

    <div class="fixed bottom-8 left-0 right-0 px-8 flex justify-center z-40">
        <button onclick="openModal()" class="w-full max-w-md btn-primary">
            <i data-lucide="plus-circle" class="w-5 h-5"></i>
            <span>TAMBAH RINCIAN BARU</span>
        </button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div class="bg-white w-full sm:max-w-lg rounded-t-[44px] sm:rounded-[36px] shadow-2xl z-50 overflow-hidden flex flex-col max-h-[94vh]">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mt-4 sm:hidden"></div>
            
            <div class="p-8 pt-6 overflow-y-auto">
                <div class="flex justify-between items-center mb-8 border-b border-slate-50 pb-4">
                    <div>
                        <h2 id="modalTitle" class="text-xl font-bold text-slate-800 tracking-tight">Input Detail</h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Formulir Produksi Barang</p>
                    </div>
                    <button onclick="closeModal()" class="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <form id="prodForm" class="space-y-6">
                    <input type="hidden" id="editId">
                    
                    <div class="inner-group">
                        <label class="field-label">Identitas Produk</label>
                        <input type="text" id="namaProduk" required placeholder="Contoh: Urea G1" class="input-field mb-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="versi" required placeholder="Versi (v.01)" class="input-field">
                            <input type="text" id="kavlingTujuan" required placeholder="Kavling (K-09)" class="input-field">
                        </div>
                    </div>

                    <div class="inner-group">
                        <label class="field-label">Lokasi & Waktu</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="lineBagging" required placeholder="Line A" class="input-field">
                            <div class="flex gap-2">
                                <input type="time" id="jamAwal" required class="input-field !px-2">
                                <input type="time" id="jamAkhir" required class="input-field !px-2">
                            </div>
                        </div>
                    </div>

                    <div class="inner-group !bg-blue-50/40 !border-blue-100/50">
                        <label class="field-label !text-blue-600">Nomor Seri Label (Range)</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="labelDari" placeholder="Dari Nomor" required class="input-field !bg-white">
                            <input type="text" id="labelSampai" placeholder="Sampai Nomor" required class="input-field !bg-white">
                        </div>
                    </div>

                    <div class="inner-group">
                        <label class="field-label">Kuantitas & Batch</label>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input type="number" id="jmlBatch" required placeholder="Jml Batch" class="input-field">
                            <input type="number" id="jmlKarung" required placeholder="Jml Karung" class="input-field border-blue-200 !text-blue-600">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="text-[9px] font-bold text-red-400 ml-1">ROBEK</label>
                                <input type="number" id="jmlRobek" required class="input-field border-red-100 !h-11">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-slate-400 ml-1">TAP (KG)</label>
                                <input type="number" step="0.01" id="jmlTap" required class="input-field !h-11">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-slate-400 ml-1">SWEEP (KG)</label>
                                <input type="number" step="0.01" id="jmlSweeping" required class="input-field !h-11">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-primary !shadow-blue-100 !bg-blue-600 !h-15 mt-2">
                        SIMPAN RINCIAN DATA
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_v2_premium')) || [];

        function openModal(editId = null) {
            document.getElementById('modal').classList.remove('hidden');
            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Update Detail";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Input Detail";
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_v2_premium', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach(item => {
                const card = `
                    <div class="glass-card !p-5 relative transition-all active:scale-[0.98]">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <i data-lucide="box" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-[15px]">${item.namaProduk}</h4>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${item.lineBagging} • ${item.versi}</p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${item.id})" class="p-2 text-slate-400 hover:text-blue-600 transition-all"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="p-2 text-slate-400 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 mb-4">
                            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 text-center">
                                <span class="block text-[8px] font-extrabold text-slate-400 uppercase mb-1">Karung</span>
                                <span class="text-[15px] font-bold text-blue-600">${item.jmlKarung}</span>
                            </div>
                            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 text-center">
                                <span class="block text-[8px] font-extrabold text-slate-400 uppercase mb-1">Robek</span>
                                <span class="text-[15px] font-bold text-red-500">${item.jmlRobek}</span>
                            </div>
                            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 text-center">
                                <span class="block text-[8px] font-extrabold text-slate-400 uppercase mb-1">Batch</span>
                                <span class="text-[15px] font-bold text-slate-700">${item.jmlBatch}</span>
                            </div>
                        </div>

                        <div class="flex justify-between items-center bg-slate-900 rounded-[14px] px-3 py-2 text-white/90">
                            <div class="flex items-center gap-1.5 text-[10px] font-bold">
                                <i data-lucide="map-pin" class="w-3 h-3 text-blue-400"></i> ${item.kavlingTujuan}
                            </div>
                            <div class="flex items-center gap-1.5 text-[10px] font-bold">
                                <i data-lucide="hash" class="w-3 h-3 text-blue-400"></i> ${item.labelDari}..
                            </div>
                            <div class="flex items-center gap-1.5 text-[10px] font-bold">
                                <i data-lucide="clock" class="w-3 h-3 text-blue-400"></i> ${item.jamAwal}
                            </div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus baris data ini?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_v2_premium', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal!");
            if(localData.length === 0) return alert("Belum ada data.");

            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i>`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Sinkronisasi Berhasil!");
                localData = [];
                localStorage.removeItem('prod_v2_premium');
                render();
            } catch (e) { alert("Koneksi gagal."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = `SINKRON DATA <i data-lucide="refresh-cw" class="w-3 h-3"></i>`;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
