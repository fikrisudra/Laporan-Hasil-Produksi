<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProFlow - Tactical UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7fa;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PROPER INPUT FIELDS --- */
        .input-tactical {
            @apply w-full h-[60px] px-5 bg-white border-2 border-slate-100 rounded-[22px] outline-none transition-all duration-300;
            @apply text-[16px] font-bold text-slate-700 shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)];
        }
        .input-tactical:focus {
            @apply border-blue-600 bg-white ring-[8px] ring-blue-600/5 shadow-lg;
            transform: translateY(-1px);
        }

        /* Khusus Input Jam agar lebih proper */
        input[type="time"].input-tactical {
            @apply flex justify-center text-center font-mono tracking-widest text-lg;
        }

        .label-tactical {
            @apply block text-[11px] font-extrabold text-slate-400 uppercase tracking-[0.2em] mb-2 ml-2;
        }

        /* --- PROPER BUTTONS --- */
        .btn-command {
            @apply relative flex items-center justify-center gap-3 h-[64px] rounded-[24px] font-extrabold text-[13px] tracking-widest uppercase transition-all duration-300 active:scale-95 active:brightness-90;
        }

        /* Tombol Kirim/Sync di Header */
        .btn-sync-pro {
            @apply flex items-center gap-2 px-6 py-3 bg-emerald-500 text-white rounded-2xl font-bold text-[11px] tracking-widest shadow-[0_10px_20px_-5px_rgba(16,185,129,0.4)] transition-all active:scale-95;
        }

        /* Tombol Input Produk Utama (FAB) */
        .btn-fab-main {
            @apply w-full max-w-md bg-slate-900 text-white shadow-[0_25px_50px_-12px_rgba(15,23,42,0.4)];
        }

        /* --- CARD & CONTAINERS --- */
        .card-glass {
            @apply bg-white/80 backdrop-blur-md border border-white rounded-[40px] p-8 shadow-[0_20px_40px_rgba(0,0,0,0.03)];
        }

        /* Animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal { animation: slideUpFade 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased pb-44">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-slate-900 rounded-[18px] flex items-center justify-center shadow-lg">
                    <i data-lucide="shield-check" class="w-6 h-6 text-blue-400"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter">ProFlow<span class="text-blue-600">.</span></h1>
            </div>
            <button onclick="sendToBackend()" id="btnKirim" class="btn-sync-pro">
                <i data-lucide="send" class="w-4 h-4 text-emerald-100"></i> KIRIM DATA
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 mt-10">
        <div class="card-glass animate-reveal">
            <div class="flex items-center gap-3 mb-8">
                <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">Metadata Sesi</h3>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="label-tactical">Tanggal Operasional</label>
                    <input type="date" id="globalTanggal" class="input-tactical">
                </div>
                
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="label-tactical">Pilih Shift</label>
                        <select id="globalShift" class="input-tactical">
                            <option value="1">Shift 01</option>
                            <option value="2">Shift 02</option>
                            <option value="3">Shift 03</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-tactical">Target Jam</label>
                        <div class="flex items-center gap-2">
                            <input type="time" id="globalJamAwal" class="input-tactical !px-2">
                            <input type="time" id="globalJamAkhir" class="input-tactical !px-2">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="listBody" class="mt-10 space-y-5"></div>
        <div id="emptyState" class="hidden text-center py-24 bg-slate-100/50 rounded-[48px] border-2 border-dashed border-slate-200">
            <i data-lucide="layers" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-slate-400 font-bold text-[11px] uppercase tracking-[0.2em]">Belum ada rincian produksi</p>
        </div>
    </main>

    <div class="fixed bottom-10 left-0 right-0 px-8 flex justify-center z-40">
        <button onclick="openModal()" class="btn-command btn-fab-main">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </div>
            <span>INPUT PRODUK BARU</span>
        </button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-end justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" id="overlay" onclick="closeModal()"></div>
        
        <div class="bg-white w-full max-w-2xl rounded-t-[54px] shadow-2xl z-[70] transform translate-y-full transition-transform duration-500 ease-out flex flex-col max-h-[96vh]" id="sheet">
            <div class="w-20 h-1.5 bg-slate-100 rounded-full mx-auto mt-6 mb-2"></div>
            
            <div class="p-10 pt-4 overflow-y-auto pb-14">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h2 id="modalTitle" class="text-2xl font-black text-slate-900">Form Produksi</h2>
                        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1">Lengkapi rincian bagging</p>
                    </div>
                    <button onclick="closeModal()" class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 active:text-red-500 transition-all"><i data-lucide="x" class="w-7 h-7"></i></button>
                </div>

                <form id="prodForm" class="space-y-8">
                    <input type="hidden" id="editId">
                    
                    <div class="space-y-5">
                        <div>
                            <label class="label-tactical">Nama & Versi Produk</label>
                            <input type="text" id="namaProduk" required placeholder="Contoh: Urea Prill" class="input-tactical mb-4">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="versi" required placeholder="Versi Produk" class="input-tactical">
                                <input type="text" id="kavlingTujuan" required placeholder="Kavling" class="input-tactical">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-tactical">Line Bagging</label>
                                <input type="text" id="lineBagging" required placeholder="Line 01" class="input-tactical">
                            </div>
                            <div>
                                <label class="label-tactical">Waktu Bagging</label>
                                <div class="flex gap-2">
                                    <input type="time" id="jamAwal" required class="input-tactical !px-2">
                                    <input type="time" id="jamAkhir" required class="input-tactical !px-2">
                                </div>
                            </div>
                        </div>

                        <div class="p-8 bg-slate-900 rounded-[36px] shadow-2xl relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 opacity-10"><i data-lucide="hash" class="w-24 h-24 text-white"></i></div>
                            <label class="block text-[11px] font-black text-blue-400 uppercase tracking-widest mb-5">Nomor Seri Label</label>
                            <div class="grid grid-cols-2 gap-4 relative z-10">
                                <input type="text" id="labelDari" placeholder="Awal" required class="w-full bg-white/5 border border-white/10 rounded-2xl h-14 px-5 outline-none font-bold text-white focus:border-blue-500 transition-all">
                                <input type="text" id="labelSampai" placeholder="Akhir" required class="w-full bg-white/5 border border-white/10 rounded-2xl h-14 px-5 outline-none font-bold text-white focus:border-blue-500 transition-all">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-tactical text-blue-600">Total Karung</label>
                                <input type="number" id="jmlKarung" required placeholder="0" class="input-tactical border-blue-100 !bg-blue-50/20 !text-blue-600">
                            </div>
                            <div>
                                <label class="label-tactical">Jumlah Batch</label>
                                <input type="number" id="jmlBatch" required placeholder="0" class="input-tactical">
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="label-tactical text-red-500">Robek</label>
                                <input type="number" id="jmlRobek" required class="input-tactical !h-14 border-red-50 !bg-red-50/30 !text-red-500">
                            </div>
                            <div>
                                <label class="label-tactical">Tap (Kg)</label>
                                <input type="number" step="0.01" id="jmlTap" required class="input-tactical !h-14">
                            </div>
                            <div>
                                <label class="label-tactical">Sweep (Kg)</label>
                                <input type="number" step="0.01" id="jmlSweeping" required class="input-tactical !h-14">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-command bg-blue-600 text-white shadow-xl shadow-blue-500/20">
                        <i data-lucide="check-circle" class="w-6 h-6"></i>
                        <span>SIMPAN DATA PRODUKSI</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scriptURL = 'URL_APPS_SCRIPT_ANDA';
        let localData = JSON.parse(localStorage.getItem('prod_tactical_v7')) || [];

        function openModal(editId = null) {
            const modal = document.getElementById('modal');
            const sheet = document.getElementById('sheet');
            modal.classList.remove('hidden');
            setTimeout(() => sheet.classList.remove('translate-y-full'), 10);

            if(editId) {
                const item = localData.find(i => i.id === editId);
                document.getElementById('editId').value = item.id;
                document.getElementById('namaProduk').value = item.namaProduk;
                document.getElementById('versi').value = item.versi;
                document.getElementById('lineBagging').value = item.lineBagging;
                document.getElementById('kavlingTujuan').value = item.kavlingTujuan;
                document.getElementById('jamAwal').value = item.jamAwal;
                document.getElementById('jamAkhir').value = item.jamAkhir;
                document.getElementById('labelDari').value = item.labelDari;
                document.getElementById('labelSampai').value = item.labelSampai;
                document.getElementById('jmlBatch').value = item.jmlBatch;
                document.getElementById('jmlKarung').value = item.jmlKarung;
                document.getElementById('jmlRobek').value = item.jmlRobek;
                document.getElementById('jmlTap').value = item.jmlTap;
                document.getElementById('jmlSweeping').value = item.jmlSweeping;
                document.getElementById('modalTitle').innerText = "Update Detail";
            } else {
                document.getElementById('prodForm').reset();
                document.getElementById('editId').value = "";
                document.getElementById('modalTitle').innerText = "Form Produksi";
            }
        }

        function closeModal() {
            const sheet = document.getElementById('sheet');
            sheet.classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 500);
        }

        document.getElementById('prodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const itemData = {
                id: editId ? parseInt(editId) : Date.now(),
                namaProduk: document.getElementById('namaProduk').value,
                versi: document.getElementById('versi').value,
                lineBagging: document.getElementById('lineBagging').value,
                kavlingTujuan: document.getElementById('kavlingTujuan').value,
                jamAwal: document.getElementById('jamAwal').value,
                jamAkhir: document.getElementById('jamAkhir').value,
                labelDari: document.getElementById('labelDari').value,
                labelSampai: document.getElementById('labelSampai').value,
                jmlBatch: document.getElementById('jmlBatch').value,
                jmlKarung: document.getElementById('jmlKarung').value,
                jmlRobek: document.getElementById('jmlRobek').value,
                jmlTap: document.getElementById('jmlTap').value,
                jmlSweeping: document.getElementById('jmlSweeping').value
            };

            if(editId) localData = localData.map(i => i.id === parseInt(editId) ? itemData : i);
            else localData.push(itemData);

            localStorage.setItem('prod_tactical_v7', JSON.stringify(localData));
            closeModal();
            render();
        });

        function render() {
            const listBody = document.getElementById('listBody');
            const emptyState = document.getElementById('emptyState');
            listBody.innerHTML = '';
            
            if(localData.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            localData.forEach((item, index) => {
                const card = `
                    <div class="animate-reveal bg-white rounded-[44px] p-8 border border-slate-100 shadow-[0_15px_40px_rgba(0,0,0,0.03)] group" style="animation-delay: ${index * 0.1}s">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-5">
                                <div class="w-16 h-16 bg-slate-900 rounded-[24px] flex items-center justify-center text-white shadow-2xl group-hover:bg-blue-600 transition-all duration-500">
                                    <i data-lucide="box" class="w-8 h-8"></i>
                                </div>
                                <div>
                                    <h4 class="font-black text-slate-800 text-xl tracking-tight leading-none">${item.namaProduk}</h4>
                                    <div class="flex gap-2 mt-2">
                                        <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-2.5 py-1 rounded-lg uppercase tracking-widest">${item.lineBagging}</span>
                                        <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2.5 py-1 rounded-lg uppercase tracking-widest">${item.versi}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-1.5">
                                <button onclick="openModal(${item.id})" class="w-11 h-11 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                <button onclick="removeItem(${item.id})" class="w-11 h-11 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 hover:text-red-500 transition-all"><i data-lucide="trash" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-8">
                            <div class="bg-blue-50/50 rounded-3xl p-4 text-center border border-blue-50">
                                <span class="block text-[9px] font-black text-blue-400 uppercase mb-1">Karung</span>
                                <span class="text-xl font-black text-blue-600">${item.jmlKarung}</span>
                            </div>
                            <div class="bg-red-50/50 rounded-3xl p-4 text-center border border-red-50">
                                <span class="block text-[9px] font-black text-red-400 uppercase mb-1">Robek</span>
                                <span class="text-xl font-black text-red-500">${item.jmlRobek}</span>
                            </div>
                            <div class="bg-slate-50/80 rounded-3xl p-4 text-center border border-slate-100">
                                <span class="block text-[9px] font-black text-slate-400 uppercase mb-1">Batch</span>
                                <span class="text-xl font-black text-slate-800">${item.jmlBatch}</span>
                            </div>
                        </div>

                        <div class="flex justify-between items-center bg-slate-900 rounded-[28px] p-5 text-white shadow-xl shadow-slate-200">
                            <div class="flex items-center gap-2 text-[11px] font-bold tracking-tight"><i data-lucide="map-pin" class="w-4 h-4 text-blue-400"></i> ${item.kavlingTujuan}</div>
                            <div class="flex items-center gap-2 text-[11px] font-bold tracking-tight"><i data-lucide="clock" class="w-4 h-4 text-blue-400"></i> ${item.jamAwal} - ${item.jamAkhir}</div>
                            <div class="bg-white/10 px-3 py-1.5 rounded-xl text-[10px] font-mono font-bold tracking-tighter border border-white/10">${item.labelDari}..</div>
                        </div>
                    </div>
                `;
                listBody.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        function removeItem(id) {
            if(confirm("Hapus rincian ini secara permanen?")) {
                localData = localData.filter(i => i.id !== id);
                localStorage.setItem('prod_tactical_v7', JSON.stringify(localData));
                render();
            }
        }

        async function sendToBackend() {
            const tgl = document.getElementById('globalTanggal').value;
            const shf = document.getElementById('globalShift').value;
            if(!tgl) return alert("Pilih Tanggal Sesi!");
            if(localData.length === 0) return alert("Antrian data kosong.");

            const btn = document.getElementById('btnKirim');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> SYNCING...`;
            lucide.createIcons();
            
            try {
                for (const item of localData) {
                    const final = { ...item, tanggal: tgl, shift: shf };
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(final) });
                }
                alert("Sinkronisasi Berhasil!");
                localData = [];
                localStorage.removeItem('prod_tactical_v7');
                render();
            } catch (e) { alert("Gagal menyambung ke server."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        }
        window.onload = render;
    </script>
</body>
</html>
